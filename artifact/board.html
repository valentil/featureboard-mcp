<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body {

  }
  h1 { font-size: 17px; margin: 0; font-weight: 800; letter-spacing: -.02em; white-space: nowrap; }

  button:disabled { opacity: .45; cursor: not-allowed; }
  .spacer { flex: 1; }
  .metrics { display: flex; gap: 14px; color: #59617a; font-size: 12px; }
  .metrics b { color: #1c2333; font-size: 13px; }
  .seg { display: inline-flex; border: 1px solid #d3d8e2; border-radius: 8px; overflow: hidden; }
  .seg button { border: 0; border-radius: 0; background: #fff; padding: 6px 10px; }

  .badge { padding: 3px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .badge.free { background: #e5f5ec; color: #1a7d47; }
  .badge.trial { background: #fff4e0; color: #a15c00; }
  .badge.frozen { background: #fde8e8; color: #b3261e; }
  .badge.lic { background: #e8ecfd; color: #384bcc; }
  .badge.h-A { background: #e5f5ec; color: #1a7d47; }
  .badge.h-B { background: #eaf6e9; color: #3d8b40; }

  .banner {

  .chip.prod { background: #edf7ee; color: #2f7d43; }
  .chip.att { background: #eef1fb; color: #4b5bdc; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  html[data-theme="dark"] .chip.att { background: #2b2d3a; color: #b7bdf0; }
  .chip.blocked { background: #fde8e8; color: #b3261e; font-weight: 600; }
  html[data-theme="dark"] .chip.blocked { background: #3a2e2a; color: #e88f7a; }
  .chip.sprint { background: #fdeee6; color: #b3591e; font-weight: 600; }
  html[data-theme="dark"] .chip.sprint { background: #3a2e26; color: #e0a58a; }
  .chip.model { background: #f3ecff; color: #7c3aed; font-weight: 600; }

  .card .del { position: absolute; top: 6px; right: 6px; border: 0; background: transparent; color: #b7bcc9; font-size: 14px; line-height: 1; padding: 2px 5px; border-radius: 6px; cursor: pointer; opacity: 0; }

  .card:hover .split { opacity: 1; }

  .overlay {
    position: fixed; inset: 0; background: rgba(20,26,45,.45); display: none;
    align-items: center; justify-content: center; z-index: 20; padding: 16px;
  }
  .overlay.show { display: flex; }
  .modal { background: #fff; border-radius: 14px; padding: 20px; max-width: 460px; width: 100%; }
  .modal h3 { margin: 0 0 6px; }
  .modal p { color: #59617a; margin: 0 0 14px; }
  .tier { display: block; width: 100%; text-align: left; border: 1px solid #d8dce6; border-radius: 10px; padding: 12px; margin-bottom: 8px; background: #fff; }
  .tier:hover { border-color: #4b5bdc; background: #f7f8ff; }
  .tier b { display: block; }
  .tier span { color: #6a7288; font-size: 12px; }
  .modal label { display: block; font-size: 12px; color: #59617a; margin: 8px 0 3px; }
  .modal input, .modal textarea { width: 100%; }
  .modal .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
  .toast {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: #1c2333; color: #fff; padding: 9px 16px; border-radius: 10px; font-size: 13px;
    opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 30; max-width: 80%;
  }
  .toast.show { opacity: 1; }
  .loading { padding: 40px; text-align: center; color: #8a90a2; }
  .subbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding: 8px 16px; background: #fff; border-bottom: 1px solid #eef0f5; }

  .subbar input[type=date] { padding: 4px 8px; }
  .rangeInfo { font-size: 12px; color: #8a90a2; }
  .colsub { display: block; font-size: 11px; color: #8a90a2; margin: -4px 6px 8px; }
  .showmore { width: 100%; margin-top: 4px; background: #e7eaf6; border: 0; color: #4b5bdc; border-radius: 8px; padding: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
  .showmore:hover { background: #dbe0f5; }

<body>
<header>
  <h1 id="brandTitle">FeatureBoard <small id="brandSub">by Lewis Valentine</small></h1>
  <select id="board"></select>
  <div class="seg" id="typeSeg">
    <button data-type="all" class="on">All</button>
    <button data-type="feature">Features</button>
    <button data-type="bug">Bugs</button>
  </div>
  <select id="productFilter" title="Filter by product"><option value="">All products</option></select>
  <select id="sprintFilter" title="Filter by sprint"><option value="">All sprints</option></select>
  <div class="spacer"></div>
  <div class="metrics" id="metrics"></div>
  <span class="badge" id="healthBadge" style="display:none"></span>
  <span class="badge lic" id="licBadge" style="display:none"></span>
  <button id="themeBtn" class="ghost" title="Toggle dark mode">🌙</button>
</header>

<div id="banner"></div>
<div id="stallBanner"></div>
<div id="liveBanner"></div>
<div class="subbar">
  <span class="lbl">Done shows:</span>
  <div class="seg" id="rangeSeg">
    <button data-range="day">Day</button>
    <button data-range="week">Week</button>
    <button data-range="month">Month</button>
    <button data-range="all">All</button>
  </div>
  <input type="date" id="refDate" />
  <button class="ghost" id="rangeToday">Today</button>
  <span class="rangeInfo" id="rangeInfo"></span>
  <div class="spacer" style="flex:1"></div>
  <button class="ghost" id="newSprintBtn" title="Create a sprint and optionally pull in the current Todo queue">🏁 New sprint</button>
  <button class="ghost" id="budgetBtn" title="Week plan, burnup vs budget, model split">💰 Budget</button>
  <button class="ghost" id="dailyPlanBtn" title="Plan today: model + effort per ticket, then dispatch sub-agents">📅 Plan</button>
  <button class="ghost" id="churnBtn" title="Autonomous churn: work without stopping for questions until a condition is met, with token budgets">🔄 Churn</button>

  <button class="ghost" id="importBtn" title="Import tasks from markdown / CSV / JSON">⬇ Import</button>
  <button class="ghost" id="linksBtn" title="Linked issues & epics">🔗 Links</button>
  <button class="ghost" id="testsBtn" title="Test runs & regressions">🧪 Tests</button>
  <button class="ghost" id="analyticsBtn" title="Velocity, health & recent work">📊 Analytics</button>
  <button class="ghost" id="timelineBtn" title="Piano-roll ticket timeline (worked spans, zoom/pan, datastream overlays)">🎹 Timeline</button>
  <button class="ghost" id="reportsBtn" title="Sprint close-out reports (marketing / sales / technical / executive)">📄 Reports</button>

</div>
<div id="content"><div class="loading">Loading board…</div></div>

<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script>
const FB = "mcp__FeatureBoard__";
const $ = (s) => document.querySelector(s);
const store = {
  get: (k, d) => { try { return JSON.parse(localStorage.getItem("fb_"+k)) ?? d; } catch { return d; } },
  set: (k, v) => { try { localStorage.setItem("fb_"+k, JSON.stringify(v)); } catch {} },
};

const today = () => new Date().toISOString().slice(0, 10);
let state = {
  board: store.get("board", null), type: store.get("type", "all"),
  range: store.get("range", "week"), refDate: store.get("refDate", today()),
  product: store.get("product", ""), sprint: store.get("sprint", ""),
  license: null, canWrite: true, tasks: [], workLog: [], config: null, monitor: null,
};
const expanded = {}; // column -> show-all toggle

// theme (FBMCPF-21): persisted dark/light toggle scoped to the artifact
function applyTheme(t) {
  document.documentElement.dataset.theme = t === "dark" ? "dark" : "";
  const b = document.getElementById("themeBtn");
  if (b) b.textContent = t === "dark" ? "☀️" : "🌙";
}
applyTheme(store.get("theme", "light"));
document.getElementById("themeBtn").addEventListener("click", () => {
  const next = store.get("theme", "light") === "dark" ? "light" : "dark";
  store.set("theme", next); applyTheme(next);
  // keep the analytics charts in sync with the theme when the overlay is open
  if (document.getElementById("anOverlay") && typeof anRenderCharts === "function") anRenderCharts();
});

async function call(tool, args = {}) {
  const r = await window.cowork.callMcpTool(FB + tool, args);
  const text = r && r.content && r.content[0] && r.content[0].text;
  if (r && r.isError) { const e = new Error(text || "Tool error"); e.tool = tool; throw e; }
  if (r && r.structuredContent !== undefined && r.structuredContent !== null) return r.structuredContent;
  try { return JSON.parse(text); } catch { return text; }
}

function toast(msg) {
  const t = $("#toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(toast._t); toast._t = setTimeout(() => t.classList.remove("show"), 3200);
}

function normalize(t) {
  const ticket = t.ticket || t.ticketNumber || "";
  const type = t.type || (/B-\d+$/.test(ticket) ? "bug" : "feature");
  return {
    ticket, type, status: t.status || "Todo", title: t.title || "(untitled)",
    due: t.due || t.dueDate || null,
    created: t.created || t.createdDate || null,
    completed: t.completed || t.completionDate || null,
    product: t.product || null, labels: t.labels || [], ref: t.ref || null,
    attachments: t.attachments || [],
    newFile: t.newFile || false, website: t.website || null,
    linked: t.linked || t.linkedIssue || null,
    blockedBy: t.blockedBy || [],
    priority: t.priority != null ? t.priority : null,
  };
}

async function loadTasks(board, type) {
  let all = [], offset = 0, limit = 200;
  for (let i = 0; i < 100; i++) {
    let res;
    try { res = await call("list_tasks", { project: board, type, limit, offset, compact: true }); }
    catch (e) { toast(e.message); break; }
    const tasks = Array.isArray(res) ? res : (res.tasks || []);
    all = all.concat(tasks);
    if (res && res.truncated && tasks.length) offset += limit; else break;
  }
  return all.map(normalize);
}

async function loadLicense() {
  try { return await call("license_status"); }
  catch { return null; } // server predates licensing (needs restart)
}

function renderLicense() {
  const lic = state.license, badge = $("#licBadge"), banner = $("#banner");
  banner.innerHTML = ""; badge.style.display = "none";
  if (!lic) return;
  state.canWrite = lic.allowWrites !== false;

  if (lic.configured === false) { openOnboarding(); return; }

  if (lic.status === "personal" || lic.status === "public") {
    badge.style.display = ""; badge.className = "badge free"; badge.textContent = lic.status === "public" ? "Free · public" : "Free · personal";
  } else if (lic.status === "trial-active") {
    badge.style.display = ""; badge.className = "badge trial"; badge.textContent = "Trial · " + (lic.trialRemainingHours ?? "?") + "h left";
    banner.innerHTML = '<div class="banner">⏳ Commercial trial — writes freeze in ' + (lic.trialRemainingHours ?? "?") + ' hours. <button class="ghost" onclick="openRequest()">Request license</button> <button class="ghost" onclick="openActivate()">Enter key</button></div>';
  } else if (lic.status === "commercial-licensed") {
    badge.style.display = ""; badge.className = "badge lic"; badge.textContent = "Licensed" + (lic.license && lic.license.licensee ? " · " + lic.license.licensee : "");
  } else if (lic.allowWrites === false) {
    badge.style.display = ""; badge.className = "badge frozen"; badge.textContent = "Writes frozen";
    banner.innerHTML = '<div class="banner stop">🔒 ' + (lic.message || "Commercial license required.") + ' <button class="primary" onclick="openRequest()">Request commercial license</button> <button class="ghost" onclick="openActivate()">Activate key</button></div>';
  }
}

// stall banner (FBMCPF-145): surfaces get_agent_monitor's stalledTickets —
// In Progress tickets with no event/work-log activity within the threshold
// (default 30min). Pairs with churn mode: a stall mid-churn usually means
// the agent is stuck or has gone quiet. Own container (#stallBanner) so it
// never fights with the license banner's innerHTML reset in renderLicense().
function renderStallBanner(monitor) {
  const box = $("#stallBanner");
  if (!box) return;
  const stalled = monitor && Array.isArray(monitor.stalledTickets) ? monitor.stalledTickets : [];
  if (!stalled.length) { box.innerHTML = ""; return; }
  const items = stalled.map((s) =>
    '<li><b>' + esc(s.ticket) + '</b>' + (s.title ? ' — ' + esc(s.title) : "") +
    (s.ageMinutes != null ? ' <span style="opacity:.75">(idle ' + fmtMinutes(s.ageMinutes) + ')</span>' : ' <span style="opacity:.75">(no activity yet)</span>') +
    '</li>'
  ).join("");
  box.innerHTML = '<div class="banner warn">⚠️ <div><b>' + stalled.length + ' stalled ticket' + (stalled.length === 1 ? "" : "s") +
    '</b> — In Progress with no activity in ' + (monitor.stallMinutes != null ? fmtMinutes(monitor.stallMinutes) : "30m") + '.' +
    '<ul>' + items + '</ul></div></div>';
}

function fmtMinutes(m) {
  if (m == null) return "";
  if (m < 60) return Math.round(m) + "m";
  const h = Math.floor(m / 60), rem = Math.round(m % 60);
  return h + "h" + (rem ? " " + rem + "m" : "");
}

// live heartbeat banner (FBMCPB-15): surfaces get_agent_monitor's per-ticket
// lastHeartbeat (phase note, model, heartbeat age) for in-flight dispatches
// so a long (5-13min) sub-agent run shows real progress on reload instead of
// a generic "multitasking" wait. Separate container from #stallBanner (which
// only lists STALLED tickets) — this lists anything that has emitted at
// least one heartbeat, whether stalled or not.
function renderLiveBanner(monitor) {
  const box = $("#liveBanner");
  if (!box) return;
  const tickets = monitor && Array.isArray(monitor.tickets) ? monitor.tickets : [];
  const active = tickets.filter((t) => t.lastHeartbeat);
  if (!active.length) { box.innerHTML = ""; return; }
  const items = active.map((t) => {
    const hb = t.lastHeartbeat;
    const phase = hb.note ? esc(hb.note) : "working";
    const modelTag = hb.model ? ' <span style="opacity:.75">[' + esc(hb.model) + ']</span>' : "";
    const age = hb.ageMinutes != null ? fmtMinutes(hb.ageMinutes) + " ago" : "just now";
    const running = t.elapsedMinutes != null ? ", running " + fmtMinutes(t.elapsedMinutes) : "";
    return '<li><b>' + esc(t.ticket) + '</b>' + modelTag + ' — ' + phase +
      ' <span style="opacity:.75">(' + age + running + ')</span></li>';
  }).join("");
  box.innerHTML = '<div class="banner info">\u23f1\ufe0f <div><b>' + active.length + ' ticket' + (active.length === 1 ? "" : "s") +
    '</b> in flight' + '<ul>' + items + '</ul></div></div>';
}

let _refreshing = false;
async function refresh(silent) {
  if (!state.board || _refreshing) return;
  _refreshing = true;
  if (!silent) $("#content").innerHTML = '<div class="loading">Loading ' + state.board + '…</div>';
  try {
    const [tasks, metrics, health, cfg, wl, monitor] = await Promise.all([
      loadTasks(state.board, state.type),
      call("get_metrics", { project: state.board }).catch(() => null),
      call("get_health", { project: state.board }).catch(() => null),
      call("get_project_config", { project: state.board }).catch(() => null),
      call("get_work_log", { project: state.board, limit: 500 }).catch(() => null),
      call("get_agent_monitor", { project: state.board }).catch(() => null),
    ]);
    state.tasks = tasks;
    state.workLog = (wl && wl.entries) || [];
    state.config = cfg;
    state.monitor = monitor;
    applyBranding(cfg);
    renderMetrics(metrics);
    renderHealth(health);
    renderStallBanner(monitor);
    renderLiveBanner(monitor);
    populateProducts(tasks);
    populateSprints(tasks);
    renderBoard(state.tasks);
  } finally { _refreshing = false; }
}

function fmtTokens(n) {
  if (!n) return "0";
  if (n >= 1e6) return (n / 1e6).toFixed(1) + "M";
  if (n >= 1e3) return (n / 1e3).toFixed(0) + "k";
  return String(n);
}
// FBMCPF-157: compact $ formatting for the metrics panel's cost line.
function fmtCost(n) {
  n = n || 0;
  if (n >= 1000) return "$" + (n / 1000).toFixed(1) + "k";
  if (n >= 1) return "$" + n.toFixed(2);
  return "$" + n.toFixed(3);
}
function renderHealth(h) {
  const el = $("#healthBadge");
  if (!h || typeof h.score !== "number") { el.style.display = "none"; return; }
  el.style.display = ""; el.className = "badge h-" + (h.grade || "C");
  el.textContent = "Health " + h.score + " · " + (h.grade || "");
  el.title = "bug pressure " + h.breakdown.bugPressure.score + " · progress " + h.breakdown.progress.score +
    " · momentum " + h.breakdown.momentum.score + " · freshness " + h.breakdown.freshness.score;
}
function populateProducts(tasks) {
  const set = new Set(tasks.map((t) => t.product).filter(Boolean));
  const cur = state.product;
  const opts = ['<option value="">All products</option>']
    .concat([...set].sort().map((p) => '<option value="' + esc(p) + '"' + (p === cur ? " selected" : "") + '>' + esc(p) + '</option>'));
  const sel = $("#productFilter");
  sel.innerHTML = opts.join("");
  if (![...set].includes(cur)) { state.product = ""; sel.value = ""; }
}

/* ---------- sprints (FBMCPF-119) ----------
   A sprint is a `sprint:<name>` label on the ticket — readable by any client and
   round-trips through the existing update_task/labels API (no server change).
   Optional start/end dates for a sprint live in localStorage per board. */
const SPRINT_RE = /^sprint:(.+)$/i;
function sprintOf(t) {
  for (const l of (t.labels || [])) { const m = String(l).match(SPRINT_RE); if (m) return m[1].trim(); }
  return null;
}
function sprintReg() { return store.get("sprints_" + state.board, []); } // [{name,start,end}]
function saveSprintReg(list) { store.set("sprints_" + state.board, list); }
function sprintMeta(name) { return sprintReg().find((s) => s.name === name) || null; }
function allSprints(tasks) {
  const names = new Set(sprintReg().map((s) => s.name));
  (tasks || []).forEach((t) => { const s = sprintOf(t); if (s) names.add(s); });
  return [...names].sort();
}
function populateSprints(tasks) {
  const names = allSprints(tasks);
  const cur = state.sprint;
  const sel = $("#sprintFilter");
  sel.innerHTML = '<option value="">All sprints</option><option value="__none">No sprint (backlog)</option>' +
    names.map((n) => '<option value="' + esc(n) + '"' + (n === cur ? " selected" : "") + '>🏁 ' + esc(n) + '</option>').join("");
  if (cur && cur !== "__none" && !names.includes(cur)) { state.sprint = ""; store.set("sprint", ""); }
  sel.value = state.sprint;
}
function inSprint(t) {
  if (!state.sprint) return true;
  const s = sprintOf(t);
  return state.sprint === "__none" ? !s : s === state.sprint;
}
async function setSprintLabel(t, name) {
  const labels = (t.labels || []).filter((l) => !SPRINT_RE.test(String(l)));
  if (name) labels.push("sprint:" + name);
  return call("update_task", { project: state.board, ticket: t.ticket, labels });
}
function openNewSprint() {
  if (!state.canWrite) { toast("Writes are frozen under the current license"); return; }
  const todoCount = state.tasks.filter((t) => t.status === "Todo" && (!state.product || t.product === state.product)).length;
  showModal(
    '<h3>🏁 New sprint</h3>' +
    '<p>Sprints are labels (<code>sprint:name</code>) on tickets, so they travel with the board. Dates are optional.</p>' +
    '<label>Sprint name</label><input id="nsName" placeholder="e.g. Sprint 1 or 2026-W29">' +
    '<div style="display:flex;gap:8px"><label style="flex:1">Start<input id="nsStart" type="date"></label>' +
    '<label style="flex:1">End<input id="nsEnd" type="date"></label></div>' +
    '<label style="display:flex;align-items:center;gap:6px;margin-top:10px"><input type="checkbox" id="nsAssign" style="width:auto"> Pull in the current Todo queue (' + todoCount + ' ticket' + (todoCount === 1 ? "" : "s") + ')</label>' +
    '<div class="actions"><button class="ghost" onclick="closeModal()">Cancel</button><button class="primary" onclick="submitNewSprint()">Create sprint</button></div>'
  );
}
async function submitNewSprint() {
  const name = $("#nsName").value.trim();
  if (!name) { toast("Sprint name is required"); return; }
  if (/[:,\[\]]/.test(name)) { toast("Sprint names can't contain : , [ or ]"); return; }
  const start = $("#nsStart").value || null, end = $("#nsEnd").value || null;
  if (start && end && end < start) { toast("Sprint end is before its start"); return; }
  const reg = sprintReg();
  const existing = reg.find((s) => s.name === name);
  if (existing) { existing.start = start || existing.start; existing.end = end || existing.end; }
  else reg.push({ name, start, end });
  saveSprintReg(reg);
  const assign = $("#nsAssign").checked;
  closeModal();
  if (assign) {
    const todo = state.tasks.filter((t) => t.status === "Todo" && (!state.product || t.product === state.product));
    try {
      await Promise.all(todo.map((t) => setSprintLabel(t, name)));
      toast("Sprint “" + name + "” created — " + todo.length + " ticket(s) assigned");
    } catch (e) { toast("Sprint created; assigning failed: " + String(e.message).slice(0, 80)); }
  } else {
    toast("Sprint “" + name + "” created");
  }
  state.sprint = name; store.set("sprint", name);
  populateSprints(state.tasks);
  await refresh(true);
}
function openSprintAssign(e, ticket) {
  if (e) e.stopPropagation();
  if (!state.canWrite) { toast("Writes are frozen under the current license"); return; }
  const t = state.tasks.find((x) => x.ticket === ticket); if (!t) return;
  const cur = sprintOf(t) || "";
  const names = allSprints(state.tasks);
  showModal(
    '<h3>🏁 Sprint — ' + esc(ticket) + '</h3>' +
    '<p>' + esc(t.title) + '</p>' +
    '<label>Assign to</label><select id="saSel"><option value="">No sprint (backlog)</option>' +
      names.map((n) => '<option value="' + esc(n) + '"' + (n === cur ? " selected" : "") + '>' + esc(n) + '</option>').join("") + '</select>' +
    '<label>…or a new sprint</label><input id="saNew" placeholder="new sprint name">' +
    '<label>Token cap for this ticket (optional, e.g. 50k)</label><input id="saCap" value="' + (capOf(t) != null ? esc(fmtTokens(capOf(t))) : "") + '" placeholder="max AI spend — enforced during churns">' +
    (spentOn(ticket) > 0 ? '<p style="margin-top:6px">⚡ ' + fmtTokens(spentOn(ticket)) + ' tokens spent so far on this ticket.</p>' : '') +
    '<div class="actions"><button class="ghost" onclick="closeModal()">Cancel</button><button class="primary" onclick="submitSprintAssign(\'' + ticket + '\')">Save</button></div>'
  );
}
async function submitSprintAssign(ticket) {
  const t = state.tasks.find((x) => x.ticket === ticket); if (!t) return;
  const nw = $("#saNew").value.trim();
  if (nw && /[:,\[\]]/.test(nw)) { toast("Sprint names can't contain : , [ or ]"); return; }
  const name = nw || $("#saSel").value;
  if (nw) {
    const reg = sprintReg();
    if (!reg.some((s) => s.name === nw)) { reg.push({ name: nw, start: null, end: null }); saveSprintReg(reg); }
  }
  const capRaw = $("#saCap").value.trim();
  let cap = null;
  if (capRaw) {
    cap = parseCap("cap:" + capRaw) || (parseInt(capRaw, 10) || null);
    if (!cap) { toast("Token cap should be a number like 50000, 50k or 1m"); return; }
  }
  const labels = (t.labels || []).filter((l) => !SPRINT_RE.test(String(l)) && !CAP_RE.test(String(l)));
  if (name) labels.push("sprint:" + name);
  if (cap) labels.push("cap:" + cap);
  try {
    await call("update_task", { project: state.board, ticket, labels });
    closeModal();
    toast((name ? ticket + " → 🏁 " + name : "Removed sprint from " + ticket) + (cap ? " · cap " + fmtTokens(cap) : ""));
    await refresh(true);
  } catch (e) { toast(String(e.message).slice(0, 120)); }
}

/* ---------- churn mode + token caps (FBMCPF-121) ----------
   Churn = an autonomous run: the agent keeps pulling tickets WITHOUT stopping to
   ask questions until a condition is met (N tickets done, token budget spent,
   a sprint finished, or a date reached). The directive is appended to the
   project's customPrompt via set_project_config, so it lands in every work
   packet the orchestrating agent assembles — the board is the control panel.
   Token caps ride on tickets as cap:<tokens> labels (e.g. cap:50k); spend is
   read live from the work log. */
const CAP_RE = /^cap:(\d+(?:\.\d+)?)([km]?)$/i;
const CHURN_START = "[CHURN MODE]", CHURN_END = "[/CHURN MODE]";
function parseCap(s) {
  const m = String(s || "").match(CAP_RE); if (!m) return null;
  const n = parseFloat(m[1]); const u = (m[2] || "").toLowerCase();
  return Math.round(n * (u === "m" ? 1e6 : u === "k" ? 1e3 : 1));
}
function capOf(t) {
  for (const l of (t.labels || [])) { const c = parseCap(l); if (c != null) return c; }
  return null;
}
function spentOn(ticket) {
  let n = 0;
  (state.workLog || []).forEach((e) => { if (e.ticket === ticket) n += e.tokens || ((e.inputTokens || 0) + (e.outputTokens || 0)) || 0; });
  return n;
}
function churnGet() { return store.get("churn_" + state.board, null); }
function churnSave(c) { store.set("churn_" + state.board, c); }
function churnProgress(c) {
  const doneNow = state.tasks.filter((t) => t.status === "Done").length;
  const doneSince = Math.max(0, doneNow - (c.baselineDone || 0));
  let tokensSince = 0;
  (state.workLog || []).forEach((e) => {
    if (!c.startedDate || (e.date && e.date >= c.startedDate)) tokensSince += e.tokens || ((e.inputTokens || 0) + (e.outputTokens || 0)) || 0;
  });
  let met = false, label = "";
  if (c.kind === "tickets") { met = doneSince >= c.value; label = doneSince + "/" + c.value + " tickets done"; }
  else if (c.kind === "tokens") { met = tokensSince >= c.value; label = fmtTokens(tokensSince) + "/" + fmtTokens(c.value) + " tokens"; }
  else if (c.kind === "sprint") {
    const inS = state.tasks.filter((t) => sprintOf(t) === c.value);
    const open = inS.filter((t) => t.status !== "Done").length;
    met = inS.length > 0 && open === 0; label = "sprint “" + c.value + "”: " + (inS.length - open) + "/" + inS.length + " done";
  }
  else if (c.kind === "date") { met = today() > c.value; label = "until " + c.value; }
  const overBudget = c.budget ? tokensSince >= c.budget : false;
  return { doneSince, tokensSince, met, overBudget, label };
}
function churnConditionText(c) {
  if (c.kind === "tickets") return c.value + " more ticket(s) are Done";
  if (c.kind === "tokens") return fmtTokens(c.value) + " tokens have been spent in this churn";
  if (c.kind === "sprint") return "every ticket in sprint “" + c.value + "” is Done";
  return "the date " + c.value + " is reached";
}
function churnDirective(c) {
  return CHURN_START + " Autonomous churn is ACTIVE (started " + c.startedDate + "). " +
    "Work the queue continuously and do NOT stop to ask the user questions — when a decision is ambiguous, make the most reasonable assumption, record it in the project scratchpad (append_scratchpad), and keep going. " +
    "Loop: next_task → set_status In Progress → get_work_packet → do the work → set_status Done with completionSummary → log_work with tokens/additions/deletions.  Dispatch sub-agents per the ticket's model: label (sonnet/haiku parallel, opus/fable sequential) and match rigor to its effort: label; only the orchestrator writes the board." +
    "STOP the churn only when: " + churnConditionText(c) + (c.budget ? ", or total spend in this churn reaches " + fmtTokens(c.budget) + " tokens" : "") + ". " +
    "Token caps: a ticket carrying a cap:<tokens> label (e.g. cap:50k) must not consume more than that; if you are about to exceed it, wrap up cleanly, log_work what was spent, note the overrun in the scratchpad, set the ticket back to Todo, and move to the next ticket. " +
    "When the stop condition is met, write a churn summary to the scratchpad and end the run. " + CHURN_END;
}
function stripChurn(prompt) {
  const s = String(prompt || "");
  const a = s.indexOf(CHURN_START), b = s.indexOf(CHURN_END);
  if (a < 0) return s.trim();
  return (b < 0 ? s.slice(0, a) : s.slice(0, a) + s.slice(b + CHURN_END.length)).replace(/\s+$/, "").trim();
}
async function applyChurnPrompt(c) {
  const cfg = await call("get_project_config", { project: state.board });
  const base = stripChurn(cfg.customPrompt);
  const next = c ? (base ? base + "\n\n" : "") + churnDirective(c) : base;
  await call("set_project_config", { project: state.board, customPrompt: next });
}
function openChurn() {
  if (!state.canWrite) { toast("Writes are frozen under the current license"); return; }
  const c = churnGet();
  if (c) {
    const p = churnProgress(c);
    showModal(
      '<h3>🔄 Churn active</h3>' +

let _bp = null;
async function openBudget() {
  showModal(

async function recalcBudget() {
  const el = document.getElementById("bpBody");
  const budgetEl = document.getElementById("bpBudget"), multEl = document.getElementById("bpMult"), daysEl = document.getElementById("bpDays");
  const budgetStr = (budgetEl && budgetEl.value || "25m").trim();
  const multiplier = parseFloat(multEl && multEl.value) || 8;
  const days = parseInt(daysEl && daysEl.value, 10) || 5;
  const budget = parseCap("cap:" + budgetStr);
  if (budget == null) { if (el) el.innerHTML = '<span class="hint">Enter a budget like 25m, 650k, or a plain number of tokens.</span>'; return; }
  if (el) el.innerHTML = '<span class="hint">Planning\u2026</span>';
  try {
    _bp = await call("plan_budget", { project: state.board, budgetTokens: Math.round(budget / multiplier), days });
    renderBudget(budget, multiplier);
  } catch (e) {
    if (el) el.innerHTML = '<span class="hint">' + esc(String(e.message).slice(0, 160)) + ' \u2014 plan_budget needs the 0.4.0+ server (repack + restart Claude Desktop).</span>';
  }
}
function renderBudget(budget, multiplier) {
  const el = document.getElementById("bpBody");
  if (!el || !_bp) return;
  const t = _bp.totals || {};
  const effective = (t.plannedTokens || 0) * multiplier;
  const byM = Object.keys(t.byModel || {}).map((m) => esc(m) + ' \u00d7' + fmtTokens(t.byModel[m]) + ' logged').join(" \u00b7 ") || "\u2014";
  const cut = _bp.cutline
    ? '<div class="hint">\u2702 Cutline: ' + _bp.cutline.unplannedTickets + ' ticket(s) beyond this week\u2019s budget (' + fmtTokens(_bp.cutline.unplannedTokens) + ' logged over).</div>'
    : "";

  // burnup: actual spend this week (Monday-to-now) from the work log, logged-basis \u00d7 multiplier
  const [mon] = weekBounds(today());
  let spentLogged = 0;
  (state.workLog || []).forEach((e) => { if (e.date && e.date >= mon) spentLogged += e.tokens || ((e.inputTokens || 0) + (e.outputTokens || 0)) || 0; });
  const spentEff = spentLogged * multiplier;
  const pct = budget > 0 ? Math.min(100, (spentEff / budget) * 100) : 0;
  const barClass = spentEff >= budget ? "over" : (spentEff >= budget * 0.8 ? "warn" : "");
  const burnup =
    '<div class="hint">Spent this week: ' + fmtTokens(spentEff) + ' of ' + fmtTokens(budget) + ' budget (' + Math.round(pct) + '%, effective)</div>' +
    '<div class="bpBarTrack"><span class="bpBarFill ' + barClass + '" style="width:' + pct + '%"></span></div>';

  const byDay = t.byDay || [];
  const byDayMax = Math.max(1, ...byDay.map((d) => d.tokens || 0));
  const dayRows = byDay.map((d) =>
    '<div class="bpDayRow"><span>Day ' + d.day + '</span>' +
    '<span class="bpBarTrack"><span class="bpBarFill" style="width:' + Math.round(((d.tokens || 0) / byDayMax) * 100) + '%"></span></span>' +
    '<span class="rangeInfo">' + fmtTokens(d.tokens || 0) + '</span></div>'
  ).join("");

  const rows = (_bp.plan || []).map((r) =>
    '<div class="dpRow"><b>' + esc(r.ticket) + '</b><span title="' + esc(r.basis + ' \u00b7 day ' + r.day) + '">' + esc(r.title.slice(0, 60)) + '</span>' +
    '<span class="chip model">\ud83e\udd16 ' + esc(r.model) + '</span>' +
    '<span class="rangeInfo">day ' + r.day + '</span>' +
    '<span class="rangeInfo">' + fmtTokens(r.remaining) + '</span></div>'
  ).join("") || '<span class="hint">Queue is clear \u2014 nothing to plan.</span>';

  const overCap = state.tasks.filter((tk) => tk.status !== "Done" && capOf(tk) != null && spentOn(tk.ticket) >= capOf(tk));
  const overCapHtml = overCap.length
    ? '<div class="bpWarn">' + overCap.map((tk) => '\u26a0 ' + esc(tk.ticket) + ' over cap').join('<br>') + '</div>'
    : "";

  el.innerHTML =
    '<div class="hint">' + (t.plannedTickets || 0) + ' tickets planned \u00b7 ' + fmtTokens(t.plannedTokens || 0) + ' logged \u00d7' + multiplier + ' = ' + fmtTokens(effective) + ' effective \u00b7 ' + byM + '</div>' +
    burnup + cut + overCapHtml + dayRows + rows;
}

// FBMCPF-134: show a Review column when the gate is on OR any ticket sits in Review.
function colsFor() {
  const hasReview = (state.config && state.config.requireReview) ||
    (state.tasks || []).some((t) => t.status === "Review");
  return hasReview ? ["Todo", "In Progress", "Review", "Done"] : ["Todo", "In Progress", "Done"];
}
const CAP = 10;

// effective date for a Done ticket: completion, else due, else created
function effDate(t) { return t.completed || t.due || t.created || null; }
function weekBounds(ref) {
  const dt = new Date(ref + "T00:00:00");
  const dow = (dt.getDay() + 6) % 7; // Mon=0
  const mon = new Date(dt); mon.setDate(dt.getDate() - dow);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  const f = (x) => x.toISOString().slice(0, 10);
  return [f(mon), f(sun)];
}
function inDoneRange(t) {
  if (state.range === "all") return true;
  const d = effDate(t); if (!d) return false;
  if (state.range === "day") return d === state.refDate;
  if (state.range === "month") return d.slice(0, 7) === state.refDate.slice(0, 7);
  const [a, b] = weekBounds(state.refDate); return d >= a && d <= b;
}
function rangeLabel() {
  if (state.range === "all") return "all time";
  if (state.range === "day") return state.refDate;
  if (state.range === "month") return state.refDate.slice(0, 7);
  const [a, b] = weekBounds(state.refDate); return a + " → " + b;
}
function toggleCol(c) { expanded[c] = !expanded[c]; renderBoard(state.tasks); }

const ticketNumOf = (tk) => parseInt((tk || "").replace(/\D+/g, ""), 10) || 0;
// queue order: by manual priority (1 = top), unset last, then newest ticket first
function sortForColumn(list, col) {
  if (col === "Done") return list; // Done keeps recency/date order
  return list.slice().sort((a, b) => {
    const pa = a.priority == null ? Infinity : a.priority;
    const pb = b.priority == null ? Infinity : b.priority;
    return pa - pb || ticketNumOf(b.ticket) - ticketNumOf(a.ticket);
  });
}

function renderBoard(tasks) {
  if (state.product) tasks = tasks.filter((t) => t.product === state.product);
  tasks = tasks.filter(inSprint);
  const cols = colsFor();
  const byCol = {};
  cols.forEach((c) => (byCol[c] = []));
  tasks.forEach((t) => (byCol[t.status] || byCol["Todo"]).push(t));
  const doneTotal = byCol["Done"].length;
  byCol["Done"] = byCol["Done"].filter(inDoneRange);
  cols.forEach((c) => { if (c !== "Done") byCol[c] = sortForColumn(byCol[c], c); });
  $("#rangeInfo").textContent = "showing " + byCol["Done"].length + " of " + doneTotal + " done · " + rangeLabel();

  let sprintBar = "";
  if (state.sprint === "__none") {
    sprintBar = '<div class="sprintbar">🏁 Backlog — ' + tasks.length + ' ticket(s) not assigned to any sprint</div>';
  } else if (state.sprint) {
    const m = sprintMeta(state.sprint);
    const dates = m && (m.start || m.end) ? " · " + (m.start || "…") + " → " + (m.end || "…") : "";
    sprintBar = '<div class="sprintbar">🏁 Sprint <b>' + esc(state.sprint) + '</b>' + dates + ' · ' + doneTotal + '/' + tasks.length + ' done</div>';
  }

  const churn = churnGet();
  if (churn) {
    const p = churnProgress(churn);
    const stateTxt = (p.met || p.overBudget)
      ? '✅ <b>Stop condition met</b> — end the churn to clear the directive.'
      : '🔄 <b>Churn active</b> — no-questions mode until ' + esc(churnConditionText(churn)) + '.';
    sprintBar += '<div class="churnbar' + ((p.met || p.overBudget) ? ' met' : '') + '">' + stateTxt +
      '<span>' + esc(p.label) + ' · ' + fmtTokens(p.tokensSince) + ' tokens spent' +
      (churn.budget ? ' of ' + fmtTokens(churn.budget) + ' budget' : '') + '</span>' +
      (state.canWrite ? '<button class="ghost" onclick="stopChurn()">⏹ End churn</button>' : '') + '</div>';
  }

  const hint = state.canWrite
    ? '<div class="hint">Drag cards between columns to change status. Hover a card and click 🏁 to assign a sprint.</div>'
    : '<div class="hint">Read-only — writes are frozen under the current license.</div>';
  const html = cols.map((c) => {
    const list = byCol[c];
    const isExp = expanded[c];
    const shown = isExp ? list : list.slice(0, CAP);
    const cards = shown.map((t, i) => cardHTML(t, { col: c, upNext: c === "Todo" && i === 0 })).join("") || '<div class="empty">No tickets</div>';
    let more = "";
    if (list.length > CAP) {
      more = isExp
        ? '<button class="showmore" onclick="toggleCol(\'' + c + '\')">Show less</button>'
        : '<button class="showmore" onclick="toggleCol(\'' + c + '\')">Show ' + (list.length - CAP) + ' more</button>';
    }
    const sub = c === "Done" ? '<span class="colsub">' + rangeLabel() + (doneTotal > list.length ? " · " + doneTotal + " total" : "") + '</span>' : "";
    return '<div class="col" data-status="' + c + '" ondragover="allow(event)" ondragleave="unhi(event)" ondrop="drop(event,\'' + c + '\')">' +
      '<h2>' + c + '<span>' + list.length + '</span></h2>' + sub + cards + more + '</div>';
  }).join("");
  $("#content").innerHTML = sprintBar + hint + '<div class="board' + (cols.length > 3 ? ' four' : '') + '">' + html + '</div>';
}

function cardHTML(t, opts) {
  opts = opts || {};
  const meta = [];
  if (t.priority != null) meta.push('<span class="prio">#' + t.priority + '</span>');
  if (t.due) meta.push('<span class="chip due">📅 ' + t.due + '</span>');
  if (t.product) meta.push('<span class="chip prod">' + esc(t.product) + '</span>');
  const sp = sprintOf(t);
  if (sp) meta.push('<span class="chip sprint" title="Sprint">🏁 ' + esc(sp) + '</span>');
  const cap = capOf(t), spent = spentOn(t.ticket);
  if (cap != null) meta.push('<span class="chip cap' + (spent >= cap ? " over" : "") + '" title="Token spend vs cap">⚡ ' + fmtTokens(spent) + '/' + fmtTokens(cap) + '</span>');
  else if (spent > 0) meta.push('<span class="chip cap" title="Tokens spent (no cap)">⚡ ' + fmtTokens(spent) + '</span>');
  if (t.ref) meta.push('<span class="chip ref">↔ ' + esc(t.ref) + '</span>');
  if (t.linked) meta.push('<span class="chip ref" title="Linked issue">🔗 ' + esc(t.linked) + '</span>');
  if (t.blockedBy && t.blockedBy.length) {
    const anyOpen = t.blockedBy.some((id) => { const b = state.tasks.find((x) => x.ticket === id); return b && b.status !== "Done"; });
    if (anyOpen) meta.push('<span class="chip blocked" title="Blocked by: ' + esc(t.blockedBy.join(", ")) + '">⛓ blocked by ' + t.blockedBy.length + '</span>');
    else meta.push('<span class="chip" title="All blockers done: ' + esc(t.blockedBy.join(", ")) + '">⛓ ✓</span>');
  }
  if (t.newFile) meta.push('<span class="chip" title="Build in a new file">📄 new file</span>');
  if (t.website) meta.push('<span class="chip" title="' + esc(t.website) + '">🌐 ' + esc(t.website.replace(/^https?:\/\//, '')) + '</span>');
  (t.attachments || []).forEach((a) => meta.push('<span class="chip att" title="' + esc(a) + '">📎 ' + esc(a.split(/[\\/]/).pop()) + '</span>'));
  const MDL_RE = /^model:(.+)$/i, EFF_RE = /^effort:(low|medium|high)$/i;
  let _m, _e;
  (t.labels || []).forEach((l) => { const m = String(l).match(MDL_RE); if (m) _m = m[1]; const e2 = String(l).match(EFF_RE); if (e2) _e = e2[1].toLowerCase(); });
  if (_m) meta.push('<span class="chip model" title="Planned model">\ud83e\udd16 ' + esc(_m) + '</span>');
  if (_e) meta.push('<span class="chip eff-' + _e + '" title="Effort level">' + _e + '</span>');
  // FBMCPF-159: intake orchestration guard — flag open tickets that reached the
  // board with no model: and no cap: label (should be rare now that intake fills
  // them in; catches tickets created before this guard, or via a raw markdown edit).
  if (!_m && cap == null && t.status !== "Done") {
    meta.push('<span class="chip unlabeled" title="No model:/cap: label — missing a sub-model orchestration decision">\u26a0 unlabeled</span>');
  }

/* ---------- drag and drop ---------- */
let dragTicket = null;
function drag(e, ticket) {
  if (!state.canWrite) { e.preventDefault(); return; }
  dragTicket = ticket;
  e.dataTransfer.effectAllowed = "move";
  try { e.dataTransfer.setData("text/plain", ticket); } catch {}
  e.currentTarget.classList.add("dragging");
}
function dragEnd(e) { e.currentTarget.classList.remove("dragging"); }
function allow(e) { e.preventDefault(); e.dataTransfer.dropEffect = "move"; e.currentTarget.classList.add("over"); }
function unhi(e) { e.currentTarget.classList.remove("over"); }
function drop(e, status) {
  e.preventDefault();
  e.currentTarget.classList.remove("over");
  const ticket = dragTicket || (e.dataTransfer && e.dataTransfer.getData("text/plain"));
  dragTicket = null;
  if (!ticket) return;
  const src = state.tasks.find((t) => t.ticket === ticket);
  if (src && src.status === status) return; // dropped on own column empty area — no-op
  move(ticket, status);
}

// card-level drop enables within-column reordering (insert before the target card)
function cardOver(e) { e.preventDefault(); e.stopPropagation(); e.currentTarget.classList.add("reorder-target"); }
function cardOut(e) { e.currentTarget.classList.remove("reorder-target"); }
function cardDrop(e, targetTicket) {
  e.preventDefault(); e.stopPropagation();
  e.currentTarget.classList.remove("reorder-target");
  const ticket = dragTicket || (e.dataTransfer && e.dataTransfer.getData("text/plain"));
  dragTicket = null;
  if (!ticket || ticket === targetTicket) return;
  const src = state.tasks.find((t) => t.ticket === ticket);
  const tgt = state.tasks.find((t) => t.ticket === targetTicket);
  if (!src || !tgt) return;
  if (src.status !== tgt.status) { move(ticket, tgt.status); return; } // cross-column: status change
  reorder(ticket, targetTicket, tgt.status);
}

async function reorder(ticket, targetTicket, col) {
  let list = state.tasks.filter((t) => t.status === col && (!state.product || t.product === state.product) && inSprint(t));
  list = sortForColumn(list, col);
  const ids = list.map((t) => t.ticket).filter((x) => x !== ticket);
  const at = ids.indexOf(targetTicket);
  ids.splice(at < 0 ? ids.length : at, 0, ticket); // insert before target
  const byId = Object.fromEntries(list.map((t) => [t.ticket, t]));
  const writes = [];
  ids.forEach((id, i) => {
    const want = i + 1;
    const t = byId[id];
    if (t && t.priority !== want) writes.push(call("update_task", { project: state.board, ticket: id, priority: want }));
  });
  if (!writes.length) return;
  try { await Promise.all(writes); toast("Reordered"); }
  catch (e) { toast("Reorder needs the updated server (repack + restart): " + e.message.slice(0, 70)); }
  await refresh(true);
}

// Fallback span when the server has no get_timeline_data yet: date-only block.
function tlSpanFromTask(t) {
  const created = t.created || t.createdDate || null;
  const completed = t.completed || t.completionDate || null;
  return {
    ticket: t.ticket || t.ticketNumber || "", title: t.title || "(untitled)",
    type: t.type || (/B-\d+$/.test(t.ticket || "") ? "bug" : "feature"),
    status: t.status || "Todo", product: t.product || null,
    sprint: (t.labels || []).map(String).map(l => (l.match(/^sprint:(.+)$/i) || [])[1]).filter(Boolean)[0] || null,
    model: (t.labels || []).map(String).map(l => (l.match(/^model:(.+)$/i) || [])[1]).filter(Boolean)[0] || null,
    created, startedAt: null, completedAt: completed ? completed + "T23:59:59" : null,
    lastActivity: null, tokens: 0, additions: 0, deletions: 0, cost: 0, days: [],
  };
}

function tlInit(data) {
  // FBMCPB-18: "now" comes from the server payload (asOf) when the server
  // supports it, so the now-line and every Done-ticket clamp below share one
  // time basis instead of the client computing its own via Date.now() —
  // falls back to the client clock only for the pre-asOf/list_tasks path.
  const nowMs = data.asOf ? Date.parse(data.asOf) : Date.now();
  const spans = (data.spans || []).map((s) => tlPrep(s, nowMs)).filter(Boolean);
  tl = {
    raw: data, spans, byDate: data.byDate || [], now: nowMs,
    group: "product", gran: "day", stream: "none", color: "status",
    viewStart: 0, pxPerMs: 1,
    gutterW: 148, rulerH: 30, streamH: 48, clipH: 18, clipGap: 4, lanePad: 8,
    rects: [], lanes: [], pinned: null, pinSpan: null, hist: {},
    dragging: false, moved: false, dx0: 0, dy0: 0, vs0: 0,
  };
  const bind = (id, key, after) => {
    const el = document.getElementById(id);
    if (el) el.addEventListener("change", (e) => { tl[key] = e.target.value; if (after) after(); tlDraw(); });
  };
  bind("tlGroup", "group"); bind("tlGran", "gran"); bind("tlColor", "color"); bind("tlStream", "stream");
  document.getElementById("tlZoomIn").addEventListener("click", () => tlZoom(tlMidX(), 1.3));
  document.getElementById("tlZoomOut").addEventListener("click", () => tlZoom(tlMidX(), 1 / 1.3));
  document.getElementById("tlFit").addEventListener("click", tlFit);
  document.getElementById("tlEmpty").style.display = spans.length ? "none" : "flex";

  const cv = document.getElementById("tlCanvas");
  cv.addEventListener("wheel", tlWheel, { passive: false });
  document.getElementById("tlRuler").addEventListener("wheel", tlWheel, { passive: false });
  cv.addEventListener("mousedown", tlDragStart);
  cv.addEventListener("mousemove", tlHoverMove);
  cv.addEventListener("mouseleave", () => { const h = document.getElementById("tlHover"); if (h) h.style.display = "none"; });
  window.addEventListener("mousemove", tlDragMove);
  window.addEventListener("mouseup", tlDragEnd);
  window.addEventListener("resize", tlOnResize);

  tlFit();
}

function tlPrep(s, nowMs) {
  const p = (v) => { if (!v) return null; const t = Date.parse(String(v).length === 10 ? v + "T00:00:00" : v); return Number.isNaN(t) ? null : t; };
  const DAY = 86400000;
  let s0 = p(s.startedAt) != null ? p(s.startedAt) : p(s.created);
  let s1 = p(s.completedAt) != null ? p(s.completedAt) : p(s.lastActivity);
  if (s0 == null && s1 != null) s0 = s1;           // completion-day-only block
  if (s0 == null) return null;                      // undated ticket → skip
  if (s1 == null || s1 <= s0) s1 = s0 + DAY;        // min one-day block
  // FBMCPB-18: belt-and-braces clamp — getTimelineData already clamps a Done
  // ticket's completedAt to its own "now", but this covers the date-only
  // fallback path (tlSpanFromTask, servers predating get_timeline_data) and
  // any stale cached payload, so a Done bar can never draw past the now-line.
  if (s.status === "Done") {
    const now = nowMs != null ? nowMs : Date.now();
    if (s1 > now) s1 = now;
    if (s0 > s1) s0 = s1;
  }
  return Object.assign({}, s, { _s0: s0, _s1: s1 });
}

function tlMidX() { const cv = document.getElementById("tlCanvas"); return tl.gutterW + (cv.clientWidth - tl.gutterW) / 2; }
function tlTopH() { return tl.rulerH + (tl.stream !== "none" ? tl.streamH : 0); }

function tlFit() {
  if (!tl) return;
  const cv = document.getElementById("tlCanvas");
  const usable = Math.max(cv.clientWidth - tl.gutterW, 100);
  if (!tl.spans.length) {
    const now = Date.now();
    tl.viewStart = now - 8 * 86400000;
    tl.pxPerMs = usable / (16 * 86400000);
    tlDraw(); return;
  }
  let lo = Infinity, hi = -Infinity;
  for (const s of tl.spans) { if (s._s0 < lo) lo = s._s0; if (s._s1 > hi) hi = s._s1; }
  const pad = Math.max((hi - lo) * 0.04, 43200000);
  lo -= pad; hi += pad;
  tl.viewStart = lo;
  tl.pxPerMs = usable / (hi - lo);
  tlDraw();
}

function tlZoom(centerX, factor) {
  if (!tl) return;
  const tAt = (centerX - tl.gutterW) / tl.pxPerMs + tl.viewStart;
  tl.pxPerMs = Math.max(1e-9, tl.pxPerMs * factor);
  tl.viewStart = tAt - (centerX - tl.gutterW) / tl.pxPerMs;
  tlDraw();
}

function tlWheel(e) {
  e.preventDefault();
  const rect = document.getElementById("tlCanvas").getBoundingClientRect();
  const x = Math.max(e.clientX - rect.left, tl.gutterW);
  if (e.shiftKey) { tl.viewStart += e.deltaY / tl.pxPerMs; tlDraw(); }
  else { tlZoom(x, e.deltaY < 0 ? 1.15 : 1 / 1.15); }
}

function tlDragStart(e) {
  tl.dragging = true; tl.moved = false;
  tl.dx0 = e.clientX; tl.dy0 = e.clientY; tl.vs0 = tl.viewStart;
  document.getElementById("tlCanvas").classList.add("grabbing");
}
function tlDragMove(e) {
  if (!tl || !tl.dragging) return;
  const dx = e.clientX - tl.dx0, dy = e.clientY - tl.dy0;
  if (Math.abs(dx) > 3 || Math.abs(dy) > 3) tl.moved = true;
  tl.viewStart = tl.vs0 - dx / tl.pxPerMs;
  const body = document.getElementById("tlBody");
  if (body) { body.scrollTop -= (e.clientY - tl.dy0); tl.dy0 = e.clientY; }
  tlDraw();
}
function tlDragEnd(e) {
  if (!tl || !tl.dragging) return;
  tl.dragging = false;
  const cv = document.getElementById("tlCanvas"); if (cv) cv.classList.remove("grabbing");
  if (!tl.moved) {
    const hit = tlHitAt(tl.dx0, tl.dy0);
    if (hit) tlPinShow(hit, tl.dx0, tl.dy0);
    else tlPinHide();
  }
}

function tlHitAt(clientX, clientY) {
  const cv = document.getElementById("tlCanvas");
  const rect = cv.getBoundingClientRect();
  const x = clientX - rect.left, y = clientY - rect.top;
  for (let i = tl.rects.length - 1; i >= 0; i--) {
    const r = tl.rects[i];
    if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) return r.span;
  }
  return null;
}

function tlHoverMove(e) {
  if (!tl || tl.dragging) return;
  const cv = document.getElementById("tlCanvas");
  const hit = tlHitAt(e.clientX, e.clientY);
  cv.classList.toggle("pointing", !!hit);
  const box = document.getElementById("tlHover");
  if (!hit) { box.style.display = "none"; return; }
  const dark = document.documentElement.getAttribute("data-theme") === "dark";
  const col = tlClipColor(hit, tlColors(dark));
  // FBMCPB-18: for a Done ticket, show when it actually finished (date + time,
  // from the clamped/precise _s1 the bar itself is drawn to — not the raw
  // date-only completionDate) so the tooltip matches what's on screen.
  const finished = hit.status === "Done" && hit._s1 != null ? ' · finished ' + tlFmtDayTime(hit._s1) : '';
  box.innerHTML =
    '<div class="tlTtl"><span class="tlDot" style="background:' + col + '"></span>' + esc(tlShort(hit.title, 46)) + '</div>' +
    '<div class="tlSub">' + esc(hit.ticket) + ' · ' + esc(hit.status) +
    (hit.model ? ' · ' + esc(hit.model) : '') + ' · ' + fmtTokens(hit.tokens || 0) + ' tok' + finished + '</div>';
  box.style.display = "block";
  let left = e.clientX + 14, top = e.clientY + 16;
  const w = box.offsetWidth || 260, h = box.offsetHeight || 48;
  if (left + w > window.innerWidth - 8) left = e.clientX - w - 14;
  if (top + h > window.innerHeight - 8) top = e.clientY - h - 14;
  box.style.left = left + "px"; box.style.top = top + "px";
}

function tlPinHide() { tl.pinned = null; tl.pinSpan = null; const el = document.getElementById("tlPin"); if (el) el.style.display = "none"; tlDraw(); }

async function tlPinShow(span, clientX, clientY) {
  tl.pinned = span.ticket; tl.pinSpan = span;
  const el = document.getElementById("tlPin");
  el.style.display = "block";
  el.innerHTML = tlPinBodyHTML(span);
  const w = 320, h = Math.min(el.offsetHeight || 300, window.innerHeight * 0.7);
  let left = clientX + 16; if (left + w > window.innerWidth - 8) left = Math.max(8, clientX - w - 16);
  let top = clientY - 10; if (top + h > window.innerHeight - 8) top = Math.max(8, window.innerHeight - h - 12);
  el.style.left = left + "px"; el.style.top = top + "px";
  tlDraw();
  if (tl.hist[span.ticket] === undefined) {
    try { const res = await call("get_ticket_history", { project: state.board, ticket: span.ticket }); tl.hist[span.ticket] = (res && res.history) || []; }
    catch (e) { tl.hist[span.ticket] = null; }
  }
  if (tl.pinned === span.ticket) tlRenderPinHist();
}

function tlPinBodyHTML(s) {
  const dark = document.documentElement.getAttribute("data-theme") === "dark";
  const col = tlClipColor(s, tlColors(dark));
  const kv = [];
  kv.push(['Status', esc(s.status)]);
  if (s.product) kv.push(['Product', esc(s.product)]);
  if (s.sprint) kv.push(['Sprint', esc(s.sprint)]);
  if (s.model) kv.push(['Model', esc(s.model)]);
  kv.push(['Worked', esc(tlFmtDay(s._s0)) + ' → ' + esc(tlFmtDay(s._s1))]);
  return '<div class="tlPinHd"><div class="tlTtl"><span class="tlDot" style="background:' + col + '"></span>' +
      esc(s.ticket) + ' — ' + esc(tlShort(s.title, 60)) + '</div>' +
      '<button class="tlX" onclick="tlPinHide()">✕</button></div>' +
    '<div class="tlKv">' + kv.map(r => '<span class="k">' + r[0] + '</span><span>' + r[1] + '</span>').join('') + '</div>' +
    '<div class="tlFields">' +
      '<label><input type="checkbox" id="tlfCost" checked onchange="tlRenderPinHist()"> 💰 Cost</label>' +
      '<label><input type="checkbox" id="tlfStatus" checked onchange="tlRenderPinHist()"> 🕘 Status</label>' +
      '<label><input type="checkbox" id="tlfWork" checked onchange="tlRenderPinHist()"> 📝 Work log</label>' +
    '</div>' +
    '<div id="tlPinHist"><span class="hint">Loading history…</span></div>';
}

function tlRenderPinHist() {
  const box = document.getElementById("tlPinHist"); if (!box || !tl.pinSpan) return;
  const s = tl.pinSpan, hist = tl.hist[s.ticket];
  const want = (id) => { const c = document.getElementById(id); return !c || c.checked; };
  let out = "";
  if (want("tlfCost")) {
    out += '<div class="tlSec"><div class="tlSecT">💰 Cost & effort</div>' +
      '<div class="tlSub">' + fmtCost(s.cost || 0) + ' · ' + fmtTokens(s.tokens || 0) + ' tokens · ' +
      '<span style="color:#3f9163">+' + (s.additions || 0) + '</span> / <span style="color:#c8503a">−' + (s.deletions || 0) + '</span></div></div>';
  }
  if (hist === null) { box.innerHTML = out + '<div class="hint" style="margin-top:8px">History unavailable (needs the 0.4.0+ server).</div>'; return; }
  if (hist === undefined) { box.innerHTML = out + '<div class="hint" style="margin-top:8px">Loading history…</div>'; return; }
  if (want("tlfStatus")) {
    const rows = hist.filter(h => h.kind === "event" && h.field === "status");
    out += '<div class="tlSec"><div class="tlSecT">🕘 Status history</div>' +
      (rows.length ? rows.map(histRowHTML).join("") : '<span class="hint">No recorded status changes.</span>') + '</div>';
  }
  if (want("tlfWork")) {
    const rows = hist.filter(h => h.kind === "work_log");
    out += '<div class="tlSec"><div class="tlSecT">📝 Work log</div>' +
      (rows.length ? rows.map(histRowHTML).join("") : '<span class="hint">No work-log entries.</span>') + '</div>';
  }
  box.innerHTML = out || '<span class="hint">Nothing selected.</span>';
}

/* ---- drawing ---- */
function tlColors(dark) {
  return {
    grid: dark ? "rgba(255,255,255,.07)" : "rgba(0,0,0,.06)",
    gridStrong: dark ? "rgba(255,255,255,.14)" : "rgba(0,0,0,.12)",
    text: dark ? "#c8c3b5" : "#6b6862",
    faint: dark ? "#7c786e" : "#9a968c",
    lane: dark ? "rgba(255,255,255,.03)" : "rgba(0,0,0,.02)",
    laneAlt: dark ? "rgba(255,255,255,.06)" : "rgba(0,0,0,.04)",
    gutter: dark ? "#232220" : "#efece4",
    top: dark ? "#232220" : "#f5f3ec",
    clipText: dark ? "#15140f" : "#1c1a12",
    today: dark ? "#d97757" : "#d0603a",
    status: { "Todo": "#8a94b8", "In Progress": "#e0982b", "Review": "#9b6bd2", "Done": "#3f9163", "Blocked": "#c8503a" },
    model: { "opus": "#9b6bd2", "sonnet": "#4b7fd4", "haiku": "#3f9163", "fable": "#d072a8", "unknown": "#8a867c" },
    stream: { tokens: dark ? "#d97757" : "#d0603a", cost: dark ? "#5bb37f" : "#3f9163", add: "#3f9163", del: "#c8503a" },
  };
}
function tlModelKey(m) {
  const s = String(m || "").toLowerCase();
  if (s.indexOf("opus") >= 0) return "opus";
  if (s.indexOf("sonnet") >= 0) return "sonnet";
  if (s.indexOf("haiku") >= 0) return "haiku";
  if (s.indexOf("fable") >= 0) return "fable";
  return "unknown";
}
function tlClipColor(s, C) {
  if (tl.color === "model") return C.model[tlModelKey(s.model)] || C.model.unknown;
  return C.status[s.status] || "#8a867c";
}
function tlBuildLanes() {
  const keyOf = (s) => tl.group === "product" ? (s.product || "Unassigned")
    : tl.group === "model" ? (tlModelKey(s.model))
    : tl.group === "type" ? (s.type || "feature")
    : tl.group === "sprint" ? (s.sprint || "No sprint")
    : (s.status || "Todo");
  const map = new Map();
  for (const s of tl.spans) { const k = keyOf(s); if (!map.has(k)) map.set(k, []); map.get(k).push(s); }
  const keys = [...map.keys()].sort((a, b) => {
    const la = /^(unassigned|unknown|no sprint)$/i.test(a), lb = /^(unassigned|unknown|no sprint)$/i.test(b);
    if (la !== lb) return la ? 1 : -1;
    return String(a).localeCompare(String(b));
  });
  return keys.map((k) => {
    const items = map.get(k).slice().sort((a, b) => a._s0 - b._s0);
    const rowEnds = [];
    for (const s of items) {
      let r = 0; for (; r < rowEnds.length; r++) if (rowEnds[r] <= s._s0) break;
      if (r === rowEnds.length) rowEnds.push(s._s1); else rowEnds[r] = s._s1;
      s._row = r;
    }
    return { key: k, items, rows: Math.max(1, rowEnds.length) };
  });
}
function tlRound(ctx, x, y, w, h, r) {
  r = Math.min(r, h / 2, w / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r); ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r); ctx.closePath();
}
function tlDraw() {
  if (!tl) return;
  const cv = document.getElementById("tlCanvas"), rl = document.getElementById("tlRuler");
  if (!cv || !rl) return;
  const dark = document.documentElement.getAttribute("data-theme") === "dark";
  const C = tlColors(dark);
  const dpr = window.devicePixelRatio || 1;
  const cw = cv.clientWidth || 800;
  const gutterW = tl.gutterW, topH = tlTopH();
  const timeToX = (t) => (t - tl.viewStart) * tl.pxPerMs + gutterW;

  const lanes = tlBuildLanes();
  let y = tl.lanePad;
  for (const lane of lanes) { lane.y = y; lane.h = lane.rows * (tl.clipH + tl.clipGap) + tl.clipGap; y += lane.h + 1; }
  const contentH = Math.max(y + tl.lanePad, 60);
  const bodyH = document.getElementById("tlBody").clientHeight - topH;
  const canvasH = Math.max(contentH, bodyH);

  // size ruler canvas
  rl.style.height = topH + "px";
  if (rl.width !== Math.round(cw * dpr) || rl.height !== Math.round(topH * dpr)) { rl.width = Math.round(cw * dpr); rl.height = Math.round(topH * dpr); }
  // size lanes canvas
  cv.style.height = canvasH + "px";
  if (cv.width !== Math.round(cw * dpr) || cv.height !== Math.round(canvasH * dpr)) { cv.width = Math.round(cw * dpr); cv.height = Math.round(canvasH * dpr); }

  const lx = cv.getContext("2d"); lx.setTransform(dpr, 0, 0, dpr, 0, 0); lx.clearRect(0, 0, cw, canvasH);
  const rx = rl.getContext("2d"); rx.setTransform(dpr, 0, 0, dpr, 0, 0); rx.clearRect(0, 0, cw, topH);

  const ticks = tlTicks(cw, timeToX);
  // FBMCPB-18: draw the now-line from the same clock the spans were clamped
  // against (tl.now, sourced from getTimelineData's asOf) instead of a
  // separately-sampled Date.now(), so the line and the bars can't drift.
  const now = tl.now != null ? tl.now : Date.now();

  // lane backgrounds + labels
  lx.font = '600 11px -apple-system,Segoe UI,Roboto,sans-serif';
  lanes.forEach((lane, i) => {
    lx.fillStyle = i % 2 ? C.laneAlt : C.lane;
    lx.fillRect(0, lane.y, cw, lane.h);
  });
  // vertical grid on lanes
  lx.strokeStyle = C.grid; lx.lineWidth = 1;
  for (const t of ticks.list) { const x = timeToX(t); if (x < gutterW) continue; lx.beginPath(); lx.moveTo(x + .5, 0); lx.lineTo(x + .5, canvasH); lx.stroke(); }
  // today marker
  const tx = timeToX(now);
  if (tx >= gutterW && tx <= cw) { lx.strokeStyle = C.today; lx.lineWidth = 1.5; lx.beginPath(); lx.moveTo(tx + .5, 0); lx.lineTo(tx + .5, canvasH); lx.stroke(); }

  // clips
  tl.rects = [];
  for (const lane of lanes) {
    for (const s of lane.items) {
      let x0 = timeToX(s._s0), x1 = timeToX(s._s1);
      if (x1 < gutterW || x0 > cw) continue;
      const cx = Math.max(x0, gutterW), cxe = Math.min(x1, cw);
      const w = Math.max(cxe - cx, 3);
      const cy = lane.y + tl.clipGap + s._row * (tl.clipH + tl.clipGap);
      const col = tlClipColor(s, C);
      const sel = tl.pinned === s.ticket;
      lx.fillStyle = col; lx.globalAlpha = s.status === "Done" ? 0.92 : 0.82;
      tlRound(lx, cx, cy, w, tl.clipH, 4); lx.fill();
      lx.globalAlpha = 1;
      if (sel) { lx.lineWidth = 2; lx.strokeStyle = dark ? "#fff" : "#1c2333"; tlRound(lx, cx + 1, cy + 1, w - 2, tl.clipH - 2, 3); lx.stroke(); }
      if (w > 44) {
        lx.fillStyle = C.clipText; lx.font = '600 10.5px -apple-system,Segoe UI,Roboto,sans-serif';
        lx.save(); lx.beginPath(); lx.rect(cx + 4, cy, w - 8, tl.clipH); lx.clip();
        lx.fillText(s.ticket + (w > 120 ? "  " + tlShort(s.title, 40) : ""), cx + 6, cy + tl.clipH - 5);
        lx.restore();
      }
      tl.rects.push({ x: cx, y: cy, w, h: tl.clipH, span: s });
    }
    // lane label in gutter (drawn last so it sits above clips)
    lx.fillStyle = C.gutter; lx.fillRect(0, lane.y, gutterW - 1, lane.h);
    lx.fillStyle = C.text; lx.font = '600 11px -apple-system,Segoe UI,Roboto,sans-serif'; lx.textBaseline = "middle";
    lx.save(); lx.beginPath(); lx.rect(0, lane.y, gutterW - 6, lane.h); lx.clip();
    lx.fillText(tlShort(String(lane.key), 20), 8, lane.y + lane.h / 2);
    lx.restore(); lx.textBaseline = "alphabetic";
  }
  lx.strokeStyle = C.gridStrong; lx.beginPath(); lx.moveTo(gutterW + .5, 0); lx.lineTo(gutterW + .5, canvasH); lx.stroke();

  /* ---- ruler + datastream on the sticky top canvas ---- */
  rx.fillStyle = C.top; rx.fillRect(0, 0, cw, topH);
  rx.strokeStyle = C.grid; rx.lineWidth = 1;
  rx.fillStyle = C.text; rx.font = '11px -apple-system,Segoe UI,Roboto,sans-serif';
  for (const t of ticks.list) {
    const x = timeToX(t); if (x < gutterW - 1) continue;
    rx.strokeStyle = C.grid; rx.beginPath(); rx.moveTo(x + .5, 0); rx.lineTo(x + .5, tl.rulerH); rx.stroke();
    rx.fillStyle = C.text; rx.fillText(tlTickLabel(t, ticks.step), x + 4, tl.rulerH - 9);
  }
  if (tx >= gutterW && tx <= cw) { rx.strokeStyle = C.today; rx.lineWidth = 1.5; rx.beginPath(); rx.moveTo(tx + .5, 0); rx.lineTo(tx + .5, topH); rx.stroke(); }
  // gutter corner label
  rx.fillStyle = C.gutter; rx.fillRect(0, 0, gutterW - 1, topH);
  rx.fillStyle = C.faint; rx.font = '600 10px -apple-system,Segoe UI,Roboto,sans-serif';
  rx.fillText("LANES · " + tl.group.toUpperCase(), 8, 13);
  rx.fillStyle = C.text; rx.font = '11px -apple-system,Segoe UI,Roboto,sans-serif';
  rx.fillText(new Date(tl.viewStart).getFullYear() + "", 8, tl.rulerH - 9);
  if (tl.stream !== "none") tlDrawStream(rx, C, cw, timeToX);
  rx.strokeStyle = C.gridStrong; rx.beginPath(); rx.moveTo(gutterW + .5, 0); rx.lineTo(gutterW + .5, topH); rx.stroke();
  rx.beginPath(); rx.moveTo(0, topH - .5); rx.lineTo(cw, topH - .5); rx.stroke();
}

function tlDrawStream(rx, C, cw, timeToX) {
  const y0 = tl.rulerH, sh = tl.streamH, base = y0 + sh - 4, maxH = sh - 8;
  const rows = tl.byDate || [];
  const metric = tl.stream;
  const val = (d) => metric === "tokens" ? (d.tokens || 0) : metric === "cost" ? (d.cost || 0) : Math.max(d.additions || 0, d.deletions || 0);
  let max = 0; for (const d of rows) max = Math.max(max, val(d), metric === "churn" ? (d.deletions || 0) : 0);
  if (max <= 0) {
    rx.fillStyle = C.faint; rx.font = '10px -apple-system,Segoe UI,Roboto,sans-serif';
    rx.fillText("no " + metric + " data in range", tl.gutterW + 8, y0 + sh / 2 + 3); return;
  }
  const DAY = 86400000;
  const bw = Math.max(Math.min(DAY * tl.pxPerMs * 0.7, 22), 2);
  for (const d of rows) {
    const t = Date.parse(d.date + "T12:00:00"); if (Number.isNaN(t)) continue;
    const x = timeToX(t); if (x < tl.gutterW - bw || x > cw + bw) continue;
    if (metric === "churn") {
      const ha = (d.additions || 0) / max * maxH, hd = (d.deletions || 0) / max * maxH;
      rx.fillStyle = C.stream.add; rx.fillRect(x - bw / 2, base - ha, bw / 2 - 0.5, ha);
      rx.fillStyle = C.stream.del; rx.fillRect(x + 0.5, base - hd, bw / 2 - 0.5, hd);
    } else {
      const h = val(d) / max * maxH;
      rx.fillStyle = C.stream[metric] || C.stream.tokens;
      tlRound(rx, x - bw / 2, base - h, bw, h, 2); rx.fill();
    }
  }
  rx.fillStyle = C.faint; rx.font = '600 9.5px -apple-system,Segoe UI,Roboto,sans-serif';
  const cap = metric === "cost" ? fmtCost(max) : metric === "tokens" ? fmtTokens(max) : ("±" + max);
  rx.fillText((metric === "churn" ? "ADD/DEL" : metric.toUpperCase()) + " · max " + cap, tl.gutterW + 6, y0 + 11);
}

function tlTicks(cw, timeToX) {
  const unit = { hour: 3600000, day: 86400000, week: 604800000, sprint: 1209600000 }[tl.gran] || 86400000;
  let step = unit, guard = 0;
  while (step * tl.pxPerMs < 62 && guard++ < 60) step *= (step < 86400000 ? 2 : step < 604800000 ? 7 : 2);
  const t0 = (tl.gutterW - tl.gutterW) / tl.pxPerMs + tl.viewStart;
  const t1 = (cw - tl.gutterW) / tl.pxPerMs + tl.viewStart;
  const list = [];
  let start = Math.floor(t0 / step) * step;
  for (let t = start; t <= t1 + step; t += step) { if (t >= tl.viewStart) list.push(t); if (list.length > 400) break; }
  return { list, step };
}
function tlTickLabel(t, step) {
  const d = new Date(t);
  const MON = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
  if (step < 86400000) return String(d.getHours()).padStart(2, "0") + ":" + String(d.getMinutes()).padStart(2, "0");
  return MON[d.getMonth()] + " " + d.getDate();
}
function tlFmtDay(t) { const d = new Date(t); const MON = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"]; return MON[d.getMonth()] + " " + d.getDate(); }
// FBMCPB-18: date + local time, for the "finished" line in the timeline
// hover tooltip — getHours/getMinutes are the browser's local clock, same
// basis as everything else drawn on the piano roll.
function tlFmtDayTime(t) {
  const d = new Date(t);
  const h = d.getHours(), m = d.getMinutes();
  const hh = ((h + 11) % 12) + 1;
  const ap = h < 12 ? "am" : "pm";
  return tlFmtDay(t) + ", " + hh + ":" + String(m).padStart(2, "0") + ap;
}
function tlShort(s, n) { s = String(s || ""); return s.length > n ? s.slice(0, n - 1) + "…" : s; }

/* ---------- sprint close-out reports (FBMCPF-156) ---------- */
async function openReports() {
  showModal('<h3>\U0001F4C4 Sprint reports</h3><div id="rpBody" class="hint">Loading…</div><div class="actions"><button class="primary" onclick="closeModal()">Close</button></div>');
  let list;
  try { list = await call("get_sprint_report", { project: state.board }); }
  catch (e) { const el = document.getElementById("rpBody"); if (el) el.innerHTML = '<div class="err">' + esc(e.message || String(e)) + '</div>'; return; }
  const reports = (list && list.reports) || [];
  const body = document.getElementById("rpBody");
  if (!body) return;
  if (!reports.length) {
    body.innerHTML = '<div class="hint">No sprint reports yet. Close a sprint from chat (“close sprint …” → close_sprint) to generate marketing / sales / technical / executive close-out reports.</div>';
    return;
  }
  window.__rp = { reports };
  const opts = reports.map((r, i) => '<option value="' + i + '">' + esc(r.sprint) + (r.metrics ? ' — ' + r.metrics.done + '/' + r.metrics.total + ' done' : '') + '</option>').join("");
  body.innerHTML = '<label>Sprint</label><select id="rpSprint">' + opts + '</select>' +
    '<div id="rpTabs" style="margin-top:10px;display:flex;gap:4px;flex-wrap:wrap"></div>' +
    '<div id="rpView" style="max-height:52vh;overflow:auto;margin-top:8px;padding:4px 2px;line-height:1.5"></div>';
  document.getElementById("rpSprint").addEventListener("change", (e) => rpLoadSprint(+e.target.value));
  rpLoadSprint(0);
}
function rpLoadSprint(i) {
  const r = window.__rp.reports[i]; if (!r) return;
  window.__rp.cur = r;
  const auds = r.audiences && r.audiences.length ? r.audiences : ["marketing", "sales", "technical", "executive"];
  document.getElementById("rpTabs").innerHTML = auds.map((a) => '<button class="ghost rpTab" data-a="' + esc(a) + '" onclick="rpShow(\'' + esc(a) + '\')">' + esc(a) + '</button>').join("");
  rpShow(auds[0]);
}
async function rpShow(a) {
  [...document.querySelectorAll(".rpTab")].forEach((b) => { const on = b.dataset.a === a; b.style.fontWeight = on ? "700" : "400"; b.style.textDecoration = on ? "underline" : "none"; });
  const view = document.getElementById("rpView"); if (!view) return;
  view.innerHTML = '<div class="hint">Loading…</div>';
  try {
    const res = await call("get_sprint_report", { project: state.board, sprint: window.__rp.cur.sprint, audience: a });
    view.innerHTML = rpMdLite(res.markdown || "");
  } catch (e) { view.innerHTML = '<div class="err">' + esc(e.message || String(e)) + '</div>'; }
}
function rpInline(t) {
  return esc(t).replace(/\*\*([^*]+)\*\*/g, "<b>$1</b>").replace(/`([^`]+)`/g, "<code>$1</code>").replace(/\*([^*]+)\*/g, "<i>$1</i>");
}
function rpMdLite(md) {
  return String(md || "").split(/\r?\n/).map((line) => {
    if (/^### /.test(line)) return '<h4 style="margin:10px 0 4px">' + rpInline(line.slice(4)) + '</h4>';
    if (/^## /.test(line)) return '<h3 style="margin:14px 0 6px">' + rpInline(line.slice(3)) + '</h3>';
    if (/^# /.test(line)) return '<h2 style="margin:4px 0 8px">' + rpInline(line.slice(2)) + '</h2>';
    if (/^> /.test(line)) return '<blockquote style="margin:6px 0;padding-left:10px;border-left:3px solid #d98b2b;opacity:.9">' + rpInline(line.slice(2)) + '</blockquote>';
    if (/^- /.test(line)) return '<div style="margin-left:14px">• ' + rpInline(line.slice(2)) + '</div>';
    if (/^---\s*$/.test(line)) return '<hr style="border:0;border-top:1px solid rgba(127,127,127,.25);margin:10px 0">';
    if (!line.trim()) return '<div style="height:6px"></div>';
    return '<div>' + rpInline(line) + '</div>';
  }).join("");
}

async function openTests() {
  showModal('<h3>🧪 Testing</h3><div id="tsBody" class="hint">Loading…</div><div class="actions"><button class="primary" onclick="closeModal()">Close</button></div>');
  try {
    const [tr, rg] = await Promise.all([
      call("get_test_runs", { project: state.board, limit: 10 }),
      call("get_regressions", { project: state.board }),
    ]);
    const s = tr.summary || {};
    const latest = s.latest;
    let html = '<div style="margin-bottom:10px">';
    if (s.runs) {
      html += 'Latest: ' + (s.passing ? '<b style="color:var(--green,#1a7d47)">passing</b>' : '<b style="color:#b3261e">failing</b>') +
        ' — ' + (latest.passed || 0) + ' passed, ' + (latest.failed || 0) + ' failed' + (latest.suite ? ' (' + esc(latest.suite) + ')' : '') +
        ' · ' + s.runs + ' run(s) logged';
    } else {
      html += '<span class="hint">No test runs logged yet. Run your tests, then record them with log_test_run.</span>';
    }
    html += '</div>';
    if ((tr.runs || []).length) {
      html += '<div style="max-height:150px;overflow:auto;margin-bottom:12px">' + tr.runs.map((r) =>
        '<div style="font-size:12px;padding:3px 0;border-top:1px solid #eef0f5">' + esc(r.date) + ' ' + esc(r.time || '') +
        ' — <b>' + (r.passed || 0) + '</b>✓ <b>' + (r.failed || 0) + '</b>✕' + (r.ticket ? ' · ' + esc(r.ticket) : '') + '</div>').join("") + '</div>';
    }
    const regs = (rg.regressions || []);
    html += '<h4 style="margin:8px 0 4px">Regressions</h4>';
    if (regs.length) {
      html += regs.map((r) => '<div style="margin-bottom:6px"><span class="tk feature">' + esc(r.feature) + '</span> ' + esc(r.title) +
        ' <span class="chip">' + r.openBugs + ' open / ' + r.bugs.length + ' bug(s)</span></div>').join("");
    } else {
      html += '<span class="hint">No bugs linked to features. Link bugs (🔗) to a feature to track regressions.</span>';
    }
    document.getElementById("tsBody").innerHTML = html;
  } catch (e) {
    document.getElementById("tsBody").innerHTML = '<span class="hint">' + esc(String(e.message).slice(0, 160)) + '</span>';
  }
}

// Optional onboarding email: explicit click of "Save email" is the only consent
