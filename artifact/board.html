<div class="toast" id="toast"></div>

<script>
const FB = "mcp__FeatureBoard__";
const $ = (s) => document.querySelector(s);
const store = {
  get: (k, d) => { try { return JSON.parse(localStorage.getItem("fb_"+k)) ?? d; } catch { return d; } },
  set: (k, v) => { try { localStorage.setItem("fb_"+k, JSON.stringify(v)); } catch {} },
};

const today = () => new Date().toISOString().slice(0, 10);
let state = {
  board: store.get("board", null), type: store.get("type", "all"),
  range: store.get("range", "week"), refDate: store.get("refDate", today()),
  product: store.get("product", ""), sprint: store.get("sprint", ""),
  license: null, canWrite: true, tasks: [], workLog: [], config: null,
};
const expanded = {}; // column -> show-all toggle

// theme (FBMCPF-21): persisted dark/light toggle scoped to the artifact
function applyTheme(t) {
  document.documentElement.dataset.theme = t === "dark" ? "dark" : "";
  const b = document.getElementById("themeBtn");
  if (b) b.textContent = t === "dark" ? "☀️" : "🌙";
}
applyTheme(store.get("theme", "light"));
document.getElementById("themeBtn").addEventListener("click", () => {
  const next = store.get("theme", "light") === "dark" ? "light" : "dark";
  store.set("theme", next); applyTheme(next);
  // keep the analytics charts in sync with the theme when the overlay is open
  if (document.getElementById("anOverlay") && typeof anRenderCharts === "function") anRenderCharts();
});

async function call(tool, args = {}) {
  const r = await window.cowork.callMcpTool(FB + tool, args);
  const text = r && r.content && r.content[0] && r.content[0].text;
  if (r && r.isError) { const e = new Error(text || "Tool error"); e.tool = tool; throw e; }
  if (r && r.structuredContent !== undefined && r.structuredContent !== null) return r.structuredContent;
  try { return JSON.parse(text); } catch { return text; }
}

function toast(msg) {
  const t = $("#toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(toast._t); toast._t = setTimeout(() => t.classList.remove("show"), 3200);
}

function normalize(t) {
  const ticket = t.ticket || t.ticketNumber || "";
  const type = t.type || (/B-\d+$/.test(ticket) ? "bug" : "feature");
  return {
    ticket, type, status: t.status || "Todo", title: t.title || "(untitled)",
    due: t.due || t.dueDate || null,
    created: t.created || t.createdDate || null,
    completed: t.completed || t.completionDate || null,
    product: t.product || null, labels: t.labels || [], ref: t.ref || null,
    attachments: t.attachments || [],
    newFile: t.newFile || false, website: t.website || null,
    linked: t.linked || t.linkedIssue || null,
    blockedBy: t.blockedBy || [],
    priority: t.priority != null ? t.priority : null,
  };
}

async function loadTasks(board, type) {
  let all = [], offset = 0, limit = 200;
  for (let i = 0; i < 100; i++) {
    let res;
    try { res = await call("list_tasks", { project: board, type, limit, offset, compact: true }); }
    catch (e) { toast(e.message); break; }
    const tasks = Array.isArray(res) ? res : (res.tasks || []);
    all = all.concat(tasks);
    if (res && res.truncated && tasks.length) offset += limit; else break;
  }
  return all.map(normalize);
}

async function loadLicense() {
  try { return await call("license_status"); }
  catch { return null; } // server predates licensing (needs restart)
}

function renderLicense() {
  const lic = state.license, badge = $("#licBadge"), banner = $("#banner");
  banner.innerHTML = ""; badge.style.display = "none";
  if (!lic) return;
  state.canWrite = lic.allowWrites !== false;

  if (lic.configured === false) { openOnboarding(); return; }

  if (lic.status === "personal" || lic.status === "public") {
    badge.style.display = ""; badge.className = "badge free"; badge.textContent = lic.status === "public" ? "Free · public" : "Free · personal";
  } else if (lic.status === "trial-active") {
    badge.style.display = ""; badge.className = "badge trial"; badge.textContent = "Trial · " + (lic.trialRemainingHours ?? "?") + "h left";
    banner.innerHTML = '<div class="banner">⏳ Commercial trial — writes freeze in ' + (lic.trialRemainingHours ?? "?") + ' hours. <button class="ghost" onclick="openRequest()">Request license</button> <button class="ghost" onclick="openActivate()">Enter key</button></div>';
  } else if (lic.status === "commercial-licensed") {
    badge.style.display = ""; badge.className = "badge lic"; badge.textContent = "Licensed" + (lic.license && lic.license.licensee ? " · " + lic.license.licensee : "");
  } else if (lic.allowWrites === false) {
    badge.style.display = ""; badge.className = "badge frozen"; badge.textContent = "Writes frozen";
    banner.innerHTML = '<div class="banner stop">🔒 ' + (lic.message || "Commercial license required.") + ' <button class="primary" onclick="openRequest()">Request commercial license</button> <button class="ghost" onclick="openActivate()">Activate key</button></div>';
  }
}

let _refreshing = false;
async function refresh(silent) {
  if (!state.board || _refreshing) return;
  _refreshing = true;
  if (!silent) $("#content").innerHTML = '<div class="loading">Loading ' + state.board + '…</div>';
  try {
    const [tasks, metrics, health, cfg, wl] = await Promise.all([
      loadTasks(state.board, state.type),
      call("get_metrics", { project: state.board }).catch(() => null),
      call("get_health", { project: state.board }).catch(() => null),
      call("get_project_config", { project: state.board }).catch(() => null),
      call("get_work_log", { project: state.board, limit: 500 }).catch(() => null),
    ]);
    state.tasks = tasks;
    state.workLog = (wl && wl.entries) || [];
    state.config = cfg;
    applyBranding(cfg);
    renderMetrics(metrics);
    renderHealth(health);
    populateProducts(tasks);
    populateSprints(tasks);
    renderBoard(state.tasks);
  } finally { _refreshing = false; }
}

function fmtTokens(n) {
  if (!n) return "0";
  if (n >= 1e6) return (n / 1e6).toFixed(1) + "M";
  if (n >= 1e3) return (n / 1e3).toFixed(0) + "k";
  return String(n);
}
function renderHealth(h) {
  const el = $("#healthBadge");
  if (!h || typeof h.score !== "number") { el.style.display = "none"; return; }
  el.style.display = ""; el.className = "badge h-" + (h.grade || "C");
  el.textContent = "Health " + h.score + " · " + (h.grade || "");
  el.title = "bug pressure " + h.breakdown.bugPressure.score + " · progress " + h.breakdown.progress.score +
    " · momentum " + h.breakdown.momentum.score + " · freshness " + h.breakdown.freshness.score;
}
function populateProducts(tasks) {
  const set = new Set(tasks.map((t) => t.product).filter(Boolean));
  const cur = state.product;
  const opts = ['<option value="">All products</option>']
    .concat([...set].sort().map((p) => '<option value="' + esc(p) + '"' + (p === cur ? " selected" : "") + '>' + esc(p) + '</option>'));
  const sel = $("#productFilter");
  sel.innerHTML = opts.join("");
  if (![...set].includes(cur)) { state.product = ""; sel.value = ""; }
}

/* ---------- sprints (FBMCPF-119) ----------
   A sprint is a `sprint:<name>` label on the ticket — readable by any client and
   round-trips through the existing update_task/labels API (no server change).
   Optional start/end dates for a sprint live in localStorage per board. */
const SPRINT_RE = /^sprint:(.+)$/i;
function sprintOf(t) {
  for (const l of (t.labels || [])) { const m = String(l).match(SPRINT_RE); if (m) return m[1].trim(); }
  return null;
}
function sprintReg() { return store.get("sprints_" + state.board, []); } // [{name,start,end}]
function saveSprintReg(list) { store.set("sprints_" + state.board, list); }
function sprintMeta(name) { return sprintReg().find((s) => s.name === name) || null; }
function allSprints(tasks) {
  const names = new Set(sprintReg().map((s) => s.name));
  (tasks || []).forEach((t) => { const s = sprintOf(t); if (s) names.add(s); });
  return [...names].sort();
}
function populateSprints(tasks) {
  const names = allSprints(tasks);
  const cur = state.sprint;
  const sel = $("#sprintFilter");
  sel.innerHTML = '<option value="">All sprints</option><option value="__none">No sprint (backlog)</option>' +
    names.map((n) => '<option value="' + esc(n) + '"' + (n === cur ? " selected" : "") + '>🏁 ' + esc(n) + '</option>').join("");
  if (cur && cur !== "__none" && !names.includes(cur)) { state.sprint = ""; store.set("sprint", ""); }
  sel.value = state.sprint;
}
function inSprint(t) {
  if (!state.sprint) return true;
  const s = sprintOf(t);
  return state.sprint === "__none" ? !s : s === state.sprint;
}
async function setSprintLabel(t, name) {
  const labels = (t.labels || []).filter((l) => !SPRINT_RE.test(String(l)));
  if (name) labels.push("sprint:" + name);
  return call("update_task", { project: state.board, ticket: t.ticket, labels });
}
function openNewSprint() {
  if (!state.canWrite) { toast("Writes are frozen under the current license"); return; }
  const todoCount = state.tasks.filter((t) => t.status === "Todo" && (!state.product || t.product === state.product)).length;
  showModal(
    '<h3>🏁 New sprint</h3>' +
    '<p>Sprints are labels (<code>sprint:name</code>) on tickets, so they travel with the board. Dates are optional.</p>' +
    '<label>Sprint name</label><input id="nsName" placeholder="e.g. Sprint 1 or 2026-W29">' +
    '<div style="display:flex;gap:8px"><label style="flex:1">Start<input id="nsStart" type="date"></label>' +
    '<label style="flex:1">End<input id="nsEnd" type="date"></label></div>' +
    '<label style="display:flex;align-items:center;gap:6px;margin-top:10px"><input type="checkbox" id="nsAssign" style="width:auto"> Pull in the current Todo queue (' + todoCount + ' ticket' + (todoCount === 1 ? "" : "s") + ')</label>' +
    '<div class="actions"><button class="ghost" onclick="closeModal()">Cancel</button><button class="primary" onclick="submitNewSprint()">Create sprint</button></div>'
  );
}
async function submitNewSprint() {
  const name = $("#nsName").value.trim();
  if (!name) { toast("Sprint name is required"); return; }
  if (/[:,\[\]]/.test(name)) { toast("Sprint names can't contain : , [ or ]"); return; }
  const start = $("#nsStart").value || null, end = $("#nsEnd").value || null;
  if (start && end && end < start) { toast("Sprint end is before its start"); return; }
  const reg = sprintReg();
  const existing = reg.find((s) => s.name === name);
  if (existing) { existing.start = start || existing.start; existing.end = end || existing.end; }
  else reg.push({ name, start, end });
  saveSprintReg(reg);
  const assign = $("#nsAssign").checked;
  closeModal();
  if (assign) {
    const todo = state.tasks.filter((t) => t.status === "Todo" && (!state.product || t.product === state.product));
    try {
      await Promise.all(todo.map((t) => setSprintLabel(t, name)));
      toast("Sprint “" + name + "” created — " + todo.length + " ticket(s) assigned");
    } catch (e) { toast("Sprint created; assigning failed: " + String(e.message).slice(0, 80)); }
  } else {
    toast("Sprint “" + name + "” created");
  }
  state.sprint = name; store.set("sprint", name);
  populateSprints(state.tasks);
  await refresh(true);
}
function openSprintAssign(e, ticket) {
  if (e) e.stopPropagation();
  if (!state.canWrite) { toast("Writes are frozen under the current license"); return; }
  const t = state.tasks.find((x) => x.ticket === ticket); if (!t) return;
  const cur = sprintOf(t) || "";
  const names = allSprints(state.tasks);
  showModal(
    '<h3>🏁 Sprint — ' + esc(ticket) + '</h3>' +
    '<p>' + esc(t.title) + '</p>' +
    '<label>Assign to</label><select id="saSel"><option value="">No sprint (backlog)</option>' +
      names.map((n) => '<option value="' + esc(n) + '"' + (n === cur ? " selected" : "") + '>' + esc(n) + '</option>').join("") + '</select>' +
    '<label>…or a new sprint</label><input id="saNew" placeholder="new sprint name">' +
    '<label>Token cap for this ticket (optional, e.g. 50k)</label><input id="saCap" value="' + (capOf(t) != null ? esc(fmtTokens(capOf(t))) : "") + '" placeholder="max AI spend — enforced during churns">' +
    (spentOn(ticket) > 0 ? '<p style="margin-top:6px">⚡ ' + fmtTokens(spentOn(ticket)) + ' tokens spent so far on this ticket.</p>' : '') +
    '<div class="actions"><button class="ghost" onclick="closeModal()">Cancel</button><button class="primary" onclick="submitSprintAssign(\'' + ticket + '\')">Save</button></div>'
  );
}
async function submitSprintAssign(ticket) {
  const t = state.tasks.find((x) => x.ticket === ticket); if (!t) return;
  const nw = $("#saNew").value.trim();
  if (nw && /[:,\[\]]/.test(nw)) { toast("Sprint names can't contain : , [ or ]"); return; }
  const name = nw || $("#saSel").value;
  if (nw) {
    const reg = sprintReg();
    if (!reg.some((s) => s.name === nw)) { reg.push({ name: nw, start: null, end: null }); saveSprintReg(reg); }
  }
  const capRaw = $("#saCap").value.trim();
  let cap = null;
  if (capRaw) {
    cap = parseCap("cap:" + capRaw) || (parseInt(capRaw, 10) || null);
    if (!cap) { toast("Token cap should be a number like 50000, 50k or 1m"); return; }
  }
  const labels = (t.labels || []).filter((l) => !SPRINT_RE.test(String(l)) && !CAP_RE.test(String(l)));
  if (name) labels.push("sprint:" + name);
  if (cap) labels.push("cap:" + cap);
  try {
    await call("update_task", { project: state.board, ticket, labels });
    closeModal();
    toast((name ? ticket + " → 🏁 " + name : "Removed sprint from " + ticket) + (cap ? " · cap " + fmtTokens(cap) : ""));
    await refresh(true);
  } catch (e) { toast(String(e.message).slice(0, 120)); }
}

/* ---------- churn mode + token caps (FBMCPF-121) ----------
   Churn = an autonomous run: the agent keeps pulling tickets WITHOUT stopping to
   ask questions until a condition is met (N tickets done, token budget spent,
   a sprint finished, or a date reached). The directive is appended to the
   project's customPrompt via set_project_config, so it lands in every work
   packet the orchestrating agent assembles — the board is the control panel.
   Token caps ride on tickets as cap:<tokens> labels (e.g. cap:50k); spend is
   read live from the work log. */
const CAP_RE = /^cap:(\d+(?:\.\d+)?)([km]?)$/i;
const CHURN_START = "[CHURN MODE]", CHURN_END = "[/CHURN MODE]";
function parseCap(s) {
  const m = String(s || "").match(CAP_RE); if (!m) return null;
  const n = parseFloat(m[1]); const u = (m[2] || "").toLowerCase();
  return Math.round(n * (u === "m" ? 1e6 : u === "k" ? 1e3 : 1));
}
function capOf(t) {
  for (const l of (t.labels || [])) { const c = parseCap(l); if (c != null) return c; }
  return null;
}
function spentOn(ticket) {
  let n = 0;
  (state.workLog || []).forEach((e) => { if (e.ticket === ticket) n += e.tokens || ((e.inputTokens || 0) + (e.outputTokens || 0)) || 0; });
  return n;
}
function churnGet() { return store.get("churn_" + state.board, null); }
function churnSave(c) { store.set("churn_" + state.board, c); }
function churnProgress(c) {
  const doneNow = state.tasks.filter((t) => t.status === "Done").length;
  const doneSince = Math.max(0, doneNow - (c.baselineDone || 0));
  let tokensSince = 0;
  (state.workLog || []).forEach((e) => {
    if (!c.startedDate || (e.date && e.date >= c.startedDate)) tokensSince += e.tokens || ((e.inputTokens || 0) + (e.outputTokens || 0)) || 0;
  });
  let met = false, label = "";
  if (c.kind === "tickets") { met = doneSince >= c.value; label = doneSince + "/" + c.value + " tickets done"; }
  else if (c.kind === "tokens") { met = tokensSince >= c.value; label = fmtTokens(tokensSince) + "/" + fmtTokens(c.value) + " tokens"; }
  else if (c.kind === "sprint") {
    const inS = state.tasks.filter((t) => sprintOf(t) === c.value);
    const open = inS.filter((t) => t.status !== "Done").length;
    met = inS.length > 0 && open === 0; label = "sprint “" + c.value + "”: " + (inS.length - open) + "/" + inS.length + " done";
  }
  else if (c.kind === "date") { met = today() > c.value; label = "until " + c.value; }
  const overBudget = c.budget ? tokensSince >= c.budget : false;
  return { doneSince, tokensSince, met, overBudget, label };
}
function churnConditionText(c) {
  if (c.kind === "tickets") return c.value + " more ticket(s) are Done";
  if (c.kind === "tokens") return fmtTokens(c.value) + " tokens have been spent in this churn";
  if (c.kind === "sprint") return "every ticket in sprint “" + c.value + "” is Done";
  return "the date " + c.value + " is reached";
}
function churnDirective(c) {
  return CHURN_START + " Autonomous churn is ACTIVE (started " + c.startedDate + "). " +
    "Work the queue continuously and do NOT stop to ask the user questions — when a decision is ambiguous, make the most reasonable assumption, record it in the project scratchpad (append_scratchpad), and keep going. " +
    "Loop: next_task → set_status In Progress → get_work_packet → do the work → set_status Done with completionSummary → log_work with tokens/additions/deletions. " +
    "STOP the churn only when: " + churnConditionText(c) + (c.budget ? ", or total spend in this churn reaches " + fmtTokens(c.budget) + " tokens" : "") + ". " +
    "Token caps: a ticket carrying a cap:<tokens> label (e.g. cap:50k) must not consume more than that; if you are about to exceed it, wrap up cleanly, log_work what was spent, note the overrun in the scratchpad, set the ticket back to Todo, and move to the next ticket. " +
    "When the stop condition is met, write a churn summary to the scratchpad and end the run. " + CHURN_END;
}
function stripChurn(prompt) {
  const s = String(prompt || "");
  const a = s.indexOf(CHURN_START), b = s.indexOf(CHURN_END);
  if (a < 0) return s.trim();
  return (b < 0 ? s.slice(0, a) : s.slice(0, a) + s.slice(b + CHURN_END.length)).replace(/\s+$/, "").trim();
}
async function applyChurnPrompt(c) {
  const cfg = await call("get_project_config", { project: state.board });
  const base = stripChurn(cfg.customPrompt);
  const next = c ? (base ? base + "\n\n" : "") + churnDirective(c) : base;
  await call("set_project_config", { project: state.board, customPrompt: next });
}
function openChurn() {
  if (!state.canWrite) { toast("Writes are frozen under the current license"); return; }
  const c = churnGet();
  if (c) {
    const p = churnProgress(c);
    showModal(
      '<h3>🔄 Churn active</h3>' +
      '<p>Working autonomously until <b>' + esc(churnConditionText(c)) + '</b>.</p>' +
      '<p>Progress: <b>' + esc(p.label) + '</b> · ' + p.doneSince + ' ticket(s) done · ' + fmtTokens(p.tokensSince) + ' tokens spent' +
      (c.budget ? ' of ' + fmtTokens(c.budget) + ' budget' : '') + '.</p>' +
      (p.met || p.overBudget ? '<p><b>The stop condition has been met</b> — end the churn to clear the directive.</p>' : '') +
      '<div class="actions"><button class="ghost" onclick="closeModal()">Close</button>' +
      '<button class="primary" onclick="stopChurn()">⏹ End churn</button></div>'
    );
    return;
  }
  const sprints = allSprints(state.tasks);
  showModal(
    '<h3>🔄 Start a churn</h3>' +
    '<p>The agent works the queue without stopping for questions until the condition is met. The directive is injected into every work packet via the project prompt.</p>' +
    '<label>Churn until…</label>' +
    '<select id="chKind" onchange="churnKindUI()">' +
      '<option value="tickets">N tickets are done</option>' +
      '<option value="tokens">A token budget is spent</option>' +
      (sprints.length ? '<option value="sprint">A sprint is complete</option>' : '') +
      '<option value="date">A date is reached</option>' +
    '</select>' +
    '<div id="chValWrap"><label id="chValLbl">Tickets</label><input id="chVal" type="number" min="1" value="5"></div>' +
    '<div id="chSprintWrap" style="display:none"><label>Sprint</label><select id="chSprint">' +
      sprints.map((s) => '<option value="' + esc(s) + '"' + (s === state.sprint ? " selected" : "") + '>🏁 ' + esc(s) + '</option>').join("") + '</select></div>' +
    '<div id="chDateWrap" style="display:none"><label>Date</label><input id="chDate" type="date"></div>' +
    '<label>Total token budget for the churn (optional, e.g. 500k)</label><input id="chBudget" placeholder="hard stop even if the condition isn\'t met">' +
    '<div class="actions"><button class="ghost" onclick="closeModal()">Cancel</button><button class="primary" onclick="submitChurn()">▶ Start churn</button></div>'
  );
}
function churnKindUI() {
  const k = $("#chKind").value;
  $("#chValWrap").style.display = (k === "tickets" || k === "tokens") ? "" : "none";
  $("#chSprintWrap").style.display = k === "sprint" ? "" : "none";
  $("#chDateWrap").style.display = k === "date" ? "" : "none";
  if (k === "tickets") { $("#chValLbl").textContent = "Tickets"; $("#chVal").value = $("#chVal").value || 5; }
  if (k === "tokens") { $("#chValLbl").textContent = "Tokens (plain number, no k/m)"; }
}
async function submitChurn() {
  const kind = $("#chKind").value;
  let value = null;
  if (kind === "tickets" || kind === "tokens") {
    value = parseInt($("#chVal").value, 10);
    if (!value || value < 1) { toast("Enter a positive number"); return; }
  } else if (kind === "sprint") {
    value = $("#chSprint").value;
    if (!value) { toast("Pick a sprint"); return; }
  } else {
    value = $("#chDate").value;
    if (!value) { toast("Pick a date"); return; }
    if (value <= today()) { toast("Pick a future date"); return; }
  }
  const budget = parseCap("cap:" + ($("#chBudget").value.trim() || "")) || (parseInt($("#chBudget").value, 10) || null);
  const c = {
    kind, value, budget,
    startedDate: today(),
    baselineDone: state.tasks.filter((t) => t.status === "Done").length,
  };
  try {
    await applyChurnPrompt(c);
    churnSave(c);
    closeModal(); toast("Churn started — directive injected into work packets");
    renderBoard(state.tasks);
  } catch (e) { toast("Couldn't start churn: " + String(e.message).slice(0, 100)); }
}
async function stopChurn() {
  try {
    await applyChurnPrompt(null);
    churnSave(null);
    closeModal(); toast("Churn ended — directive removed");
    renderBoard(state.tasks);
  } catch (e) { toast("Couldn't end churn: " + String(e.message).slice(0, 100)); }
}

/* ---------- daily plan (FBMCPF-153) ---------- */
let _dp = null;
async function openDailyPlan() {
  showModal(
    '<h3>\ud83d\udcc5 Daily plan \u2014 ' + esc(state.board) + '</h3>' +
    '<div id="dpBody" style="max-height:55vh;overflow:auto"><span class="hint">Planning\u2026</span></div>' +
    '<div class="actions"><button class="ghost" onclick="closeModal()">Close</button>' +
    '<button class="ghost" id="dpApply" onclick="applyDailyPlan()" disabled>Apply labels</button>' +
    '<button class="primary" id="dpGo" onclick="queueDispatch()" disabled>\ud83d\ude80 Queue dispatch</button></div>'
  );
  _dp = null;
  try {
    _dp = await call("daily_plan", { project: state.board });
    renderDailyPlan();
  } catch (e) {
    const el = document.getElementById("dpBody");
    if (el) el.innerHTML = '<span class="hint">' + esc(String(e.message).slice(0, 160)) + ' \u2014 daily_plan needs the 0.4.0+ server (repack + restart Claude Desktop).</span>';
  }
}
function renderDailyPlan() {
  const el = document.getElementById("dpBody");
  if (!el || !_dp) return;
  if (!_dp.plan.length) { el.innerHTML = '<span class="hint">Queue is clear \u2014 nothing to plan.</span>'; return; }
  const rows = _dp.plan.map((r) =>
    '<div class="dpRow"><b>' + esc(r.ticket) + '</b><span title="' + esc(r.modelBasis + ' \u00b7 ' + r.effortBasis) + '">' + esc(r.title.slice(0, 60)) + '</span>' +
    '<span class="chip model">\ud83e\udd16 ' + esc(r.model) + '</span>' +
    '<span class="chip eff-' + esc(r.effort) + '">' + esc(r.effort) + '</span>' +
    '<span class="rangeInfo">' + fmtTokens(r.estimate) + '</span></div>'
  ).join("");

async function recalcBudget() {
  const el = document.getElementById("bpBody");

  const budgetStr = (budgetEl && budgetEl.value || "25m").trim();

  const budget = parseCap("cap:" + budgetStr);

  if (el) el.innerHTML = '<span class="hint">Planning\u2026</span>';
  try {
    _bp = await call("plan_budget", { project: state.board, budgetTokens: Math.round(budget / multiplier), days });
    renderBudget(budget, multiplier);
  } catch (e) {
    if (el) el.innerHTML = '<span class="hint">' + esc(String(e.message).slice(0, 160)) + ' \u2014 plan_budget needs the 0.4.0+ server (repack + restart Claude Desktop).</span>';
  }
}
function renderBudget(budget, multiplier) {
  const el = document.getElementById("bpBody");
  if (!el || !_bp) return;
  const t = _bp.totals || {};
  const effective = (t.plannedTokens || 0) * multiplier;
  const byM = Object.keys(t.byModel || {}).map((m) => esc(m) + ' \u00d7' + fmtTokens(t.byModel[m]) + ' logged').join(" \u00b7 ") || "\u2014";
  const cut = _bp.cutline
    ? '<div class="hint">\u2702 Cutline: ' + _bp.cutline.unplannedTickets + ' ticket(s) beyond this week\u2019s budget (' + fmtTokens(_bp.cutline.unplannedTokens) + ' logged over).</div>'
    : "";

  // burnup: actual spend this week (Monday-to-now) from the work log, logged-basis \u00d7 multiplier
  const [mon] = weekBounds(today());
  let spentLogged = 0;
  (state.workLog || []).forEach((e) => { if (e.date && e.date >= mon) spentLogged += e.tokens || ((e.inputTokens || 0) + (e.outputTokens || 0)) || 0; });
  const spentEff = spentLogged * multiplier;
  const pct = budget > 0 ? Math.min(100, (spentEff / budget) * 100) : 0;
  const barClass = spentEff >= budget ? "over" : (spentEff >= budget * 0.8 ? "warn" : "");
  const burnup =
    '<div class="hint">Spent this week: ' + fmtTokens(spentEff) + ' of ' + fmtTokens(budget) + ' budget (' + Math.round(pct) + '%, effective)</div>' +
    '<div class="bpBarTrack"><span class="bpBarFill ' + barClass + '" style="width:' + pct + '%"></span></div>';

  const byDay = t.byDay || [];
  const byDayMax = Math.max(1, ...byDay.map((d) => d.tokens || 0));
  const dayRows = byDay.map((d) =>
    '<div class="bpDayRow"><span>Day ' + d.day + '</span>' +
    '<span class="bpBarTrack"><span class="bpBarFill" style="width:' + Math.round(((d.tokens || 0) / byDayMax) * 100) + '%"></span></span>' +
    '<span class="rangeInfo">' + fmtTokens(d.tokens || 0) + '</span></div>'
  ).join("");

  const rows = (_bp.plan || []).map((r) =>
    '<div class="dpRow"><b>' + esc(r.ticket) + '</b><span title="' + esc(r.basis + ' \u00b7 day ' + r.day) + '">' + esc(r.title.slice(0, 60)) + '</span>' +
    '<span class="chip model">\ud83e\udd16 ' + esc(r.model) + '</span>' +
    '<span class="rangeInfo">day ' + r.day + '</span>' +
    '<span class="rangeInfo">' + fmtTokens(r.remaining) + '</span></div>'
  ).join("") || '<span class="hint">Queue is clear \u2014 nothing to plan.</span>';

  const overCap = state.tasks.filter((tk) => tk.status !== "Done" && capOf(tk) != null && spentOn(tk.ticket) >= capOf(tk));
  const overCapHtml = overCap.length
    ? '<div class="bpWarn">' + overCap.map((tk) => '\u26a0 ' + esc(tk.ticket) + ' over cap').join('<br>') + '</div>'
    : "";

  el.innerHTML =
    '<div class="hint">' + (t.plannedTickets || 0) + ' tickets planned \u00b7 ' + fmtTokens(t.plannedTokens || 0) + ' logged \u00d7' + multiplier + ' = ' + fmtTokens(effective) + ' effective \u00b7 ' + byM + '</div>' +
    burnup + cut + overCapHtml + dayRows + rows;
}

// FBMCPF-134: show a Review column when the gate is on OR any ticket sits in Review.
function colsFor() {
  const hasReview = (state.config && state.config.requireReview) ||
    (state.tasks || []).some((t) => t.status === "Review");
  return hasReview ? ["Todo", "In Progress", "Review", "Done"] : ["Todo", "In Progress", "Done"];
}
const CAP = 10;

// effective date for a Done ticket: completion, else due, else created
function effDate(t) { return t.completed || t.due || t.created || null; }
function weekBounds(ref) {
  const dt = new Date(ref + "T00:00:00");
  const dow = (dt.getDay() + 6) % 7; // Mon=0
  const mon = new Date(dt); mon.setDate(dt.getDate() - dow);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  const f = (x) => x.toISOString().slice(0, 10);
  return [f(mon), f(sun)];
}
function inDoneRange(t) {
  if (state.range === "all") return true;
  const d = effDate(t); if (!d) return false;
  if (state.range === "day") return d === state.refDate;
  if (state.range === "month") return d.slice(0, 7) === state.refDate.slice(0, 7);
  const [a, b] = weekBounds(state.refDate); return d >= a && d <= b;
}
function rangeLabel() {
  if (state.range === "all") return "all time";
  if (state.range === "day") return state.refDate;
  if (state.range === "month") return state.refDate.slice(0, 7);
  const [a, b] = weekBounds(state.refDate); return a + " → " + b;
}
function toggleCol(c) { expanded[c] = !expanded[c]; renderBoard(state.tasks); }

const ticketNumOf = (tk) => parseInt((tk || "").replace(/\D+/g, ""), 10) || 0;
// queue order: by manual priority (1 = top), unset last, then newest ticket first
function sortForColumn(list, col) {
  if (col === "Done") return list; // Done keeps recency/date order
  return list.slice().sort((a, b) => {
    const pa = a.priority == null ? Infinity : a.priority;
    const pb = b.priority == null ? Infinity : b.priority;
    return pa - pb || ticketNumOf(b.ticket) - ticketNumOf(a.ticket);
  });
}

function renderBoard(tasks) {
  if (state.product) tasks = tasks.filter((t) => t.product === state.product);

    sprintBar = '<div class="sprintbar">🏁 Sprint <b>' + esc(state.sprint) + '</b>' + dates + ' · ' + doneTotal + '/' + tasks.length + ' done</div>';

    let more = "";

        ? '<button class="showmore" onclick="toggleCol(\'' + c + '\')">Show less</button>'

    }

    return '<div class="col" data-status="' + c + '" ondragover="allow(event)" ondragleave="unhi(event)" ondrop="drop(event,\'' + c + '\')">' +
      '<h2>' + c + '<span>' + list.length + '</span></h2>' + sub + cards + more + '</div>';
  }).join("");
  $("#content").innerHTML = sprintBar + hint + '<div class="board' + (cols.length > 3 ? ' four' : '') + '">' + html + '</div>';

function cardHTML(t, opts) {

  else if (spent > 0) meta.push('<span class="chip cap" title="Tokens spent (no cap)">⚡ ' + fmtTokens(spent) + '</span>');
  if (t.ref) meta.push('<span class="chip ref">↔ ' + esc(t.ref) + '</span>');
  if (t.linked) meta.push('<span class="chip ref" title="Linked issue">🔗 ' + esc(t.linked) + '</span>');

  if (t.website) meta.push('<span class="chip" title="' + esc(t.website) + '">🌐 ' + esc(t.website.replace(/^https?:\/\//, '')) + '</span>');
  (t.attachments || []).forEach((a) => meta.push('<span class="chip att" title="' + esc(a) + '">📎 ' + esc(a.split(/[\\/]/).pop()) + '</span>'));
  const MDL_RE = /^model:(.+)$/i, EFF_RE = /^effort:(low|medium|high)$/i;
  let _m, _e;
  (t.labels || []).forEach((l) => { const m = String(l).match(MDL_RE); if (m) _m = m[1]; const e2 = String(l).match(EFF_RE); if (e2) _e = e2[1].toLowerCase(); });
  if (_m) meta.push('<span class="chip model" title="Planned model">\ud83e\udd16 ' + esc(_m) + '</span>');
  if (_e) meta.push('<span class="chip eff-' + _e + '" title="Effort level">' + _e + '</span>');
  (t.labels || []).forEach((l) => { if (SPRINT_RE.test(String(l)) || CAP_RE.test(String(l)) || MDL_RE.test(String(l)) || EFF_RE.test(String(l))) return; meta.push('<span class="chip">' + esc(l) + '</span>'); });
  const canW = state.canWrite;
  const dragAttrs = canW
    ? ' draggable="true" ondragstart="drag(event,\'' + t.ticket + '\')" ondragend="dragEnd(event)"' +
      ' ondragover="cardOver(event)" ondragleave="cardOut(event)" ondrop="cardDrop(event,\'' + t.ticket + '\')"'
    : ' draggable="false"';
  const del = canW ? '<button class="del" title="Delete" onclick="deleteCard(event,\'' + t.ticket + '\')">✕</button>' : "";

  const sprintBtn = canW ? '<button class="sprintBtn" title="Assign sprint" onclick="openSprintAssign(event,\'' + t.ticket + '\')">🏁</button>' : "";
  const reviewBtns = (canW && opts.col === "Review")

      '<button class="reject" title="Reject → In Progress" onclick="rejectCard(event,\'' + t.ticket + '\')">↩</button>'
    : "";
  const next = opts.upNext ? '<span class="upnext">UP NEXT</span>' : "";
  return '<div class="card" data-ticket="' + t.ticket + '" data-col="' + opts.col + '"' + dragAttrs + '>' + del + split + sprintBtn + reviewBtns +
    '<div class="top"><span class="tk ' + t.type + '">' + esc(t.ticket) + '</span>' + next + '</div>' +
    '<div class="title">' + esc(t.title) + '</div>' +
    (meta.length ? '<div class="meta">' + meta.join("") + '</div>' : "") + '</div>';

/* ---------- drag and drop ---------- */
let dragTicket = null;
function drag(e, ticket) {
  if (!state.canWrite) { e.preventDefault(); return; }
  dragTicket = ticket;
  e.dataTransfer.effectAllowed = "move";
  try { e.dataTransfer.setData("text/plain", ticket); } catch {}
  e.currentTarget.classList.add("dragging");
}
function dragEnd(e) { e.currentTarget.classList.remove("dragging"); }
function allow(e) { e.preventDefault(); e.dataTransfer.dropEffect = "move"; e.currentTarget.classList.add("over"); }
function unhi(e) { e.currentTarget.classList.remove("over"); }
function drop(e, status) {
  e.preventDefault();
  e.currentTarget.classList.remove("over");
  const ticket = dragTicket || (e.dataTransfer && e.dataTransfer.getData("text/plain"));
  dragTicket = null;
  if (!ticket) return;
  const src = state.tasks.find((t) => t.ticket === ticket);
  if (src && src.status === status) return; // dropped on own column empty area — no-op
  move(ticket, status);
}

// card-level drop enables within-column reordering (insert before the target card)
function cardOver(e) { e.preventDefault(); e.stopPropagation(); e.currentTarget.classList.add("reorder-target"); }
function cardOut(e) { e.currentTarget.classList.remove("reorder-target"); }
function cardDrop(e, targetTicket) {
  e.preventDefault(); e.stopPropagation();
  e.currentTarget.classList.remove("reorder-target");
  const ticket = dragTicket || (e.dataTransfer && e.dataTransfer.getData("text/plain"));
  dragTicket = null;
  if (!ticket || ticket === targetTicket) return;
  const src = state.tasks.find((t) => t.ticket === ticket);
  const tgt = state.tasks.find((t) => t.ticket === targetTicket);
  if (!src || !tgt) return;
  if (src.status !== tgt.status) { move(ticket, tgt.status); return; } // cross-column: status change
  reorder(ticket, targetTicket, tgt.status);
}

async function reorder(ticket, targetTicket, col) {
  let list = state.tasks.filter((t) => t.status === col && (!state.product || t.product === state.product) && inSprint(t));
  list = sortForColumn(list, col);
  const ids = list.map((t) => t.ticket).filter((x) => x !== ticket);
  const at = ids.indexOf(targetTicket);
  ids.splice(at < 0 ? ids.length : at, 0, ticket); // insert before target
  const byId = Object.fromEntries(list.map((t) => [t.ticket, t]));
  const writes = [];
  ids.forEach((id, i) => {
    const want = i + 1;
    const t = byId[id];
    if (t && t.priority !== want) writes.push(call("update_task", { project: state.board, ticket: id, priority: want }));
  });
  if (!writes.length) return;
  try { await Promise.all(writes); toast("Reordered"); }
  catch (e) { toast("Reorder needs the updated server (repack + restart): " + e.message.slice(0, 70)); }
  await refresh(true);
}

async function submitAdd() {
  const type = $("#adType").value;
  const title = $("#adTitle").value.trim();
  if (!title) { toast("Title is required"); return; }
  const args = { project: state.board, title };
  const desc = $("#adDesc").value.trim(); if (desc) args.description = desc;
  const prod = $("#adProd").value.trim(); if (prod) args.product = prod;
  const labels = [];
  const sprint = $("#adSprint") ? $("#adSprint").value : ""; if (sprint) labels.push("sprint:" + sprint);
  const capRaw = $("#adCap") ? $("#adCap").value.trim() : "";
  if (capRaw) {
    const cap = parseCap("cap:" + capRaw) || (parseInt(capRaw, 10) || null);
    if (!cap) { toast("Token cap should be a number like 50000, 50k or 1m"); return; }

function openBrainstorm() {
  const prods = [...new Set(state.tasks.map((t) => t.product).filter(Boolean))].sort();
  const canAI = !!(window.cowork && window.cowork.askClaude);
  showModal(
    '<h3>💡 Brainstorm features</h3>' +
    '<p>One feature per line. Use “Title: description” to add detail. Bulk-added to <b>' + esc(state.board) + '</b>.</p>' +
    (canAI
      ? '<label>Generate ideas from a goal (optional)</label>' +
        '<div style="display:flex;gap:6px"><input id="bsGoal" placeholder="e.g. improve onboarding"><button class="ghost" id="bsGenBtn" onclick="generateIdeas()">✨ Generate</button></div>'
      : '') +
    '<label>Features</label><textarea id="bsBody" rows="8" placeholder="Dark mode toggle&#10;CSV export: let users download their board&#10;Keyboard shortcuts"></textarea>' +
    '<label>Product (optional, applied to all)</label><input id="bsProd" list="bsProdList" placeholder="optional"><datalist id="bsProdList">' +

    '<div class="actions"><button class="ghost" onclick="closeModal()">Cancel</button><button class="primary" onclick="submitBrainstorm()">Add features</button></div>'
  );
}
function parseTaskLines(text) {
  return String(text || "").split(/\r?\n/).map((l) => l.trim()).filter(Boolean).map((line) => {
    const m = line.match(/^(.*?):\s+(.*)$/);
    return m ? { title: m[1].trim(), description: m[2].trim() } : { title: line };
  });
}
async function generateIdeas() {
  const btn = document.getElementById("bsGenBtn");
  const goal = ($("#bsGoal").value || "").trim();
  if (!goal) { toast("Enter a goal first"); return; }
  if (!(window.cowork && window.cowork.askClaude)) { toast("AI generation unavailable"); return; }
  if (btn) { btn.disabled = true; btn.textContent = "…"; }
  try {
    const prompt = "Brainstorm 6 concise product feature ideas for this goal: \"" + goal + "\". " +
      "Return ONLY a plain list, one feature per line, formatted as \"Title: one-sentence description\". No numbering, no preamble.";
    const out = await window.cowork.askClaude(prompt, []);
    const text = typeof out === "string" ? out : (out && (out.text || out.content || ""));
    const cleaned = String(text || "").split(/\r?\n/).map((l) => l.replace(/^\s*[-*\d.)]+\s*/, "").trim()).filter(Boolean).join("\n");
    const ta = $("#bsBody");
    ta.value = ta.value.trim() ? ta.value.trim() + "\n" + cleaned : cleaned;
  } catch (e) { toast("Generate failed: " + String(e.message || e).slice(0, 80)); }
  finally { if (btn) { btn.disabled = false; btn.textContent = "✨ Generate"; } }
}
async function submitBrainstorm() {
  const features = parseTaskLines($("#bsBody").value);
  if (!features.length) { toast("Add at least one feature line"); return; }
  const prod = ($("#bsProd").value || "").trim();
  if (prod) features.forEach((f) => (f.product = prod));
  try {
    const res = await call("add_features_bulk", { project: state.board, features });
    const n = (res && res.created && res.created.length) || features.length;
    closeModal(); toast("Added " + n + " feature" + (n === 1 ? "" : "s"));
    await refresh(true);
  } catch (e) { toast(String(e.message).slice(0, 120)); }
}

/* ---------- dependency / links view (FBMCPF-33) ---------- */
function openLinks() {
  const tasks = state.tasks;
  const byId = Object.fromEntries(tasks.map((t) => [t.ticket, t]));
  const childrenOf = {};
  tasks.forEach((t) => { if (t.linked) (childrenOf[t.linked] = childrenOf[t.linked] || []).push(t); });
  const parentIds = Object.keys(childrenOf).sort((a, b) => ticketNumOf(a) - ticketNumOf(b));
  let body;
  if (!parentIds.length) {
    body = '<p class="hint">No linked tickets yet. Link a bug to the feature it affects, or decompose a feature into subtasks.</p>';
  } else {
    body = parentIds.map((pid) => {
      const p = byId[pid];
      const head = p
        ? '<span class="tk ' + p.type + '">' + esc(p.ticket) + '</span> <b>' + esc(p.title) + '</b> <span class="chip">' + esc(p.status) + '</span>'
        : '<b>' + esc(pid) + '</b> <span class="hint">(not on this board)</span>';
      const kids = childrenOf[pid].map((c) =>
        '<div style="margin-left:18px;padding:3px 0">↳ <span class="tk ' + c.type + '">' + esc(c.ticket) + '</span> ' + esc(c.title) +
        ' <span class="chip">' + esc(c.status) + '</span></div>').join("");
      return '<div style="margin-bottom:12px"><div>🔗 ' + head + '</div>' + kids + '</div>';
    }).join("");
  }
  showModal('<h3>🔗 Linked issues &amp; epics</h3><div style="max-height:60vh;overflow:auto">' + body + '</div>' +
    '<div class="actions"><button class="primary" onclick="closeModal()">Close</button></div>');
}

/* ---------- auto-prioritize Todo (FBMCPF-31) ---------- */
async function autoPrioritize() {
  if (!state.canWrite) { toast("Writes are frozen under the current license"); return; }
  let todo = state.tasks.filter((t) => t.status === "Todo" && (!state.product || t.product === state.product) && inSprint(t));
  if (!todo.length) { toast("No Todo tickets to prioritize"); return; }
  const dueVal = (t) => (t.due ? (Date.parse(t.due) || Infinity) : Infinity);
  todo = todo.slice().sort((a, b) => dueVal(a) - dueVal(b) || ticketNumOf(a.ticket) - ticketNumOf(b.ticket));
  if (!confirm("Auto-prioritize " + todo.length + " Todo tickets by due date (earliest first)? This overwrites their manual priority.")) return;
  try {
    await Promise.all(todo.map((t, i) => call("update_task", { project: state.board, ticket: t.ticket, priority: i + 1 })));
    toast("Prioritized " + todo.length + " tickets by due date");
    await refresh(true);
  } catch (e) { toast(String(e.message).slice(0, 100)); }
}

function anBuildVel(byDate){ const el=document.getElementById("anVel"); if(!el)return; const dates=Object.keys(byDate).sort(); if(!dates.length){el.parentElement.innerHTML='<div class="l" style="text-align:center;padding:40px 0">No velocity data yet.</div>';return;} const p=anPal(); anCharts.vel=new Chart(el,{data:{labels:dates,datasets:[{type:"bar",label:"Additions",data:dates.map(d=>byDate[d].additions||0),backgroundColor:p.green,yAxisID:"y",borderRadius:4},{type:"bar",label:"Deletions",data:dates.map(d=>byDate[d].deletions||0),backgroundColor:p.red,yAxisID:"y",borderRadius:4},{type:"line",label:"Tokens",data:dates.map(d=>byDate[d].tokens||0),borderColor:p.accent,backgroundColor:p.accent,yAxisID:"y1",tension:.3,pointRadius:3}]},options:{responsive:true,maintainAspectRatio:false,scales:{x:{grid:{display:false},ticks:{color:p.tick,font:{size:11}}},y:{position:"left",beginAtZero:true,grid:{color:p.grid},ticks:{color:p.tick}},y1:{position:"right",beginAtZero:true,grid:{display:false},ticks:{color:p.accent,callback:x=>x>=1000?(x/1000)+"k":x}}},plugins:{legend:{labels:{color:p.label,boxWidth:12,font:{size:11}}}}}}); }
function anBuildTl(tasks){ const el=document.getElementById("anTl"); if(!el)return; const c={},d2={}; tasks.forEach(t=>{ if(t.created)c[t.created]=(c[t.created]||0)+1; if(t.completed)d2[t.completed]=(d2[t.completed]||0)+1; }); const dates=[...new Set([...Object.keys(c),...Object.keys(d2)])].sort(); if(!dates.length){el.parentElement.innerHTML='<div class="l" style="text-align:center;padding:40px 0">No dated tickets yet.</div>';return;} const p=anPal(); anCharts.tl=new Chart(el,{type:"bar",data:{labels:dates,datasets:[{label:"Created",data:dates.map(x=>c[x]||0),backgroundColor:p.accent,borderRadius:4},{label:"Completed",data:dates.map(x=>d2[x]||0),backgroundColor:p.green,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,scales:{x:{grid:{display:false},ticks:{color:p.tick,font:{size:11}}},y:{beginAtZero:true,grid:{color:p.grid},ticks:{color:p.tick,precision:0}}},plugins:{legend:{labels:{color:p.label,boxWidth:12,font:{size:11}}}}}}); }
function anBuildEff(rows){ const el=document.getElementById("anEff"); if(!el)return; if(!rows.length){el.parentElement.innerHTML='<div class="l" style="text-align:center;padding:40px 0">No logged effort yet.</div>';return;} const p=anPal(); anCharts.eff=new Chart(el,{type:"bar",data:{labels:rows.map(r=>r.ticket),datasets:[{label:"Additions",data:rows.map(r=>r.add),backgroundColor:p.green,borderRadius:4,stack:"s"},{label:"Deletions",data:rows.map(r=>r.del),backgroundColor:p.red,borderRadius:4,stack:"s"}]},options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,scales:{x:{stacked:true,grid:{color:p.grid},ticks:{color:p.tick}},y:{stacked:true,grid:{display:false},ticks:{color:p.label,font:{weight:"600"}}}},plugins:{legend:{labels:{color:p.label,boxWidth:12,font:{size:11}}},tooltip:{callbacks:{afterTitle:items=>anTITLES[items[0].label]?anShort(anTITLES[items[0].label],50):""}}}}}); }
function anRenderWorkLog(filter){ const box=document.getElementById("anFeed"); if(!box)return; const rows=filter?anWL.filter(e=>e.ticket===filter):anWL; if(!rows.length){box.innerHTML='<div class="l" style="padding:16px 2px">No work-log entries.</div>';return;} let html="",last=null; rows.forEach(e=>{ if(e.date!==last){html+='<div class="dh">'+esc(e.date)+'</div>';last=e.date;} const ttl=anTITLES[e.ticket]?'<span style="opacity:.7">'+esc(anShort(anTITLES[e.ticket],60))+'</span> ':""; const churn=(e.additions!=null||e.deletions!=null)?'<span class="pos">+'+(e.additions||0)+'</span> <span class="neg">−'+(e.deletions||0)+'</span>':""; html+='<div class="ev"><div class="tick">'+esc(e.ticket||"—")+'</div><div>'+ttl+esc(anShort(e.text||e.summary||"",170))+'</div><div style="text-align:right;font-size:11px">'+churn+'<br><span style="opacity:.5">'+esc(e.model||"")+'</span></div></div>'; }); box.innerHTML=html; }

async function openTests() {
  showModal('<h3>🧪 Testing</h3><div id="tsBody" class="hint">Loading…</div><div class="actions"><button class="primary" onclick="closeModal()">Close</button></div>');
  try {
    const [tr, rg] = await Promise.all([
      call("get_test_runs", { project: state.board, limit: 10 }),
      call("get_regressions", { project: state.board }),
    ]);
    const s = tr.summary || {};
    const latest = s.latest;
    let html = '<div style="margin-bottom:10px">';
    if (s.runs) {
      html += 'Latest: ' + (s.passing ? '<b style="color:var(--green,#1a7d47)">passing</b>' : '<b style="color:#b3261e">failing</b>') +
        ' — ' + (latest.passed || 0) + ' passed, ' + (latest.failed || 0) + ' failed' + (latest.suite ? ' (' + esc(latest.suite) + ')' : '') +
        ' · ' + s.runs + ' run(s) logged';
    } else {
      html += '<span class="hint">No test runs logged yet. Run your tests, then record them with log_test_run.</span>';
    }
    html += '</div>';
    if ((tr.runs || []).length) {
      html += '<div style="max-height:150px;overflow:auto;margin-bottom:12px">' + tr.runs.map((r) =>
        '<div style="font-size:12px;padding:3px 0;border-top:1px solid #eef0f5">' + esc(r.date) + ' ' + esc(r.time || '') +
        ' — <b>' + (r.passed || 0) + '</b>✓ <b>' + (r.failed || 0) + '</b>✕' + (r.ticket ? ' · ' + esc(r.ticket) : '') + '</div>').join("") + '</div>';
    }
    const regs = (rg.regressions || []);
    html += '<h4 style="margin:8px 0 4px">Regressions</h4>';
    if (regs.length) {
      html += regs.map((r) => '<div style="margin-bottom:6px"><span class="tk feature">' + esc(r.feature) + '</span> ' + esc(r.title) +
        ' <span class="chip">' + r.openBugs + ' open / ' + r.bugs.length + ' bug(s)</span></div>').join("");
    } else {
      html += '<span class="hint">No bugs linked to features. Link bugs (🔗) to a feature to track regressions.</span>';
    }
    document.getElementById("tsBody").innerHTML = html;
  } catch (e) {
    document.getElementById("tsBody").innerHTML = '<span class="hint">' + esc(String(e.message).slice(0, 160)) + '</span>';
  }
}

/* ---------- board settings (FBMCPF-28) ---------- */
let _prods = [];
function prodChips() {
  return _prods.map((p) => '<span class="chip">' + esc(p) + ' <a href="#" onclick="removeProd(event,\'' + esc(p) + '\')">✕</a></span>').join(" ");
}
function renderProds() { const el = document.getElementById("stProds"); if (el) el.innerHTML = prodChips() || '<span class="rangeInfo">none</span>'; }
function addProd() { const i = $("#stNewProd"); const v = i.value.trim(); if (v && !_prods.includes(v)) _prods.push(v); i.value = ""; renderProds(); }
function removeProd(e, p) { e.preventDefault(); _prods = _prods.filter((x) => x !== p); renderProds(); }
async function openSettings() {
  let cfg;
  try { cfg = await call("get_project_config", { project: state.board }); }
  catch (e) {
    showModal('<h3>Board settings</h3><p>Settings need the updated server. Repack + restart Claude Desktop to enable it.</p><div class="actions"><button class="primary" onclick="closeModal()">OK</button></div>');
    return;
  }
  _prods = (cfg.products || []).slice();
  showModal(
    '<h3>Settings — ' + esc(state.board) + '</h3>' +
    '<label>Description</label><input id="stDesc" value="' + esc(cfg.description || "") + '">' +
    '<label>Code location</label><input id="stCode" value="' + esc(cfg.codeLocation || "") + '" placeholder="C:\\path\\to\\code">' +
    '<label>Agent model</label><input id="stModel" value="' + esc(cfg.agentModel || "") + '">' +
    '<label>Website</label><input id="stSite" value="' + esc(cfg.website || "") + '">' +
    '<label>Brand title</label><input id="stBrand" value="' + esc(cfg.brandTitle || "") + '" placeholder="FeatureBoard">' +
    '<label>Brand subtitle</label><input id="stBrandSub" value="' + esc(cfg.brandSubtitle || "") + '" placeholder="by Lewis Valentine">' +
    '<label>Custom prompt (injected into every work packet)</label><textarea id="stPrompt" rows="2">' + esc(cfg.customPrompt || "") + '</textarea>' +
    '<label>Products</label><div id="stProds">' + (prodChips() || '<span class="rangeInfo">none</span>') + '</div>' +
    '<div style="display:flex;gap:6px;margin-top:6px"><input id="stNewProd" placeholder="add product"><button class="ghost" onclick="addProd()">Add</button></div>' +
    '<div class="actions"><button class="ghost" onclick="closeModal()">Cancel</button><button class="primary" onclick="saveSettings()">Save</button></div>'
  );
}
async function saveSettings() {
  const patch = {
    project: state.board,
    description: $("#stDesc").value.trim(),
    codeLocation: $("#stCode").value.trim(),
    agentModel: $("#stModel").value.trim(),
    website: $("#stSite").value.trim(),
    brandTitle: $("#stBrand").value.trim(),
    brandSubtitle: $("#stBrandSub").value.trim(),
    customPrompt: $("#stPrompt").value.trim(),
    products: _prods,
  };
  try { await call("set_project_config", patch); closeModal(); toast("Settings saved"); await refresh(true); }
  catch (e) { toast(e.message.slice(0, 120)); }
}

/* ---------- scratchpad (FBMCPF-25) ---------- */
async function openNotes() {
  let sp;
  try { sp = await call("get_scratchpad", { project: state.board }); }
  catch (e) {
    const msg = (e && e.message) ? e.message : String(e);
    // Surface the ACTUAL error rather than assuming "old server". A missing-tool /
    // allowlist error means the board artifact's mcp_tools list predates get_scratchpad.
    const looksMissing = /not (in|found)|allowlist|unknown tool|method not found|-3260|is not a function|no such tool/i.test(msg);
    showModal(
      '<h3>📝 Notes</h3>' +
      '<p>Couldn\'t open the scratchpad:</p>' +
      '<p style="font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;color:#8a94a6;white-space:pre-wrap;word-break:break-word">' + esc(msg) + '</p>' +
      (looksMissing
        ? '<p>The board view is missing the <code>get_scratchpad</code> tool in its allowlist. Re-open the board (or restart Claude Desktop) so it picks up the current tool set.</p>'
        : '') +
      '<div class="actions"><button class="primary" onclick="closeModal()">OK</button></div>'
    );
    return;
  }
  const ro = state.canWrite ? "" : " disabled";
  showModal(
    '<h3>📝 Scratchpad — ' + esc(state.board) + '</h3>' +
    '<p>Freeform project notes. Mention a ticket id (e.g. ' + esc(state.board.replace(/\\s+/g, "")) + ') to surface a line in that ticket\'s work packet.</p>' +
    '<textarea id="spBody" rows="12" style="font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px"' + ro + '>' + esc(sp.content || "") + '</textarea>' +
    '<div class="actions"><button class="ghost" onclick="closeModal()">Close</button>' +
    (state.canWrite ? '<button class="primary" onclick="saveNotes()">Save</button>' : "") + '</div>'
  );
}
async function saveNotes() {
  try {
    await call("set_scratchpad", { project: state.board, content: $("#spBody").value });
    closeModal(); toast("Notes saved");
  } catch (e) { toast(e.message.slice(0, 120)); }
}

async function move(ticket, status) {
  try {
    await call("set_status", { project: state.board, ticket, status });
    toast(ticket + " → " + status);
    await refresh();
  } catch (e) {
    toast(e.message.slice(0, 120));
    state.license = await loadLicense(); renderLicense();
  }
}

/* ---------- onboarding / licensing modals ---------- */
function showModal(html) { $("#modal").innerHTML = html; $("#overlay").classList.add("show"); }
function closeModal() { $("#overlay").classList.remove("show"); }
$("#overlay").addEventListener("click", (e) => { if (e.target.id === "overlay") closeModal(); });

function openOnboarding() {
  showModal(
    '<h3>Welcome to FeatureBoard</h3><p>How are you using it? This sets your license tier.</p>' +
    '<button class="tier" onclick="pickTier(\'personal\')"><b>Personal / non-commercial</b><span>Free forever. Private, hobby, or personal projects.</span></button>' +
    '<button class="tier" onclick="pickTier(\'public\')"><b>Public / open-source / nonprofit</b><span>Free forever for non-commercial public work.</span></button>' +
    '<button class="tier" onclick="pickTier(\'commercial-trial\')"><b>Commercial — start 24h trial</b><span>Evaluate commercially for 24 hours. Writes freeze after that until licensed.</span></button>' +
    '<button class="tier" onclick="openActivate()"><b>Commercial — I have a license key</b><span>Enter a key issued after signing a commercial agreement.</span></button>'
  );
}
async function pickTier(type) {
  try { state.license = await call("set_usage_type", { type }); closeModal(); renderLicense(); toast("Usage set: " + type); }
  catch (e) { toast(e.message); }
}
function openActivate() {
  showModal(
    '<h3>Activate license key</h3><p>Paste the commercial license key you received.</p>' +
    '<label>License key</label><textarea id="keyIn" rows="4" placeholder="paste key…"></textarea>' +
    '<div class="actions"><button class="ghost" onclick="closeModal()">Cancel</button><button class="primary" onclick="doActivate()">Activate</button></div>'
  );
}
async function doActivate() {
  const key = $("#keyIn").value.trim(); if (!key) return;
  try { state.license = await call("activate_license", { key }); closeModal(); renderLicense(); refresh(); toast("License activated"); }
  catch (e) { toast(e.message.slice(0, 140)); }
}
function openRequest() {
  showModal(
    '<h3>Request a commercial license</h3><p>Send your details to start a commercial agreement.</p>' +
    '<label>Name</label><input id="rqName"><label>Email</label><input id="rqEmail">' +
    '<label>Company</label><input id="rqCo"><label>Seats (approx)</label><input id="rqSeats" type="number">' +
    '<label>Notes</label><textarea id="rqNotes" rows="2"></textarea>' +
    '<div class="actions"><button class="ghost" onclick="closeModal()">Cancel</button><button class="primary" onclick="doRequest()">Send request</button></div>'
  );
}
async function doRequest() {
  const args = {
    name: $("#rqName").value.trim(), email: $("#rqEmail").value.trim(),
    company: $("#rqCo").value.trim(), notes: $("#rqNotes").value.trim(),
  };
  const seats = parseInt($("#rqSeats").value, 10); if (seats) args.seats = seats;
  if (!args.name || !args.email || !args.company) { toast("Name, email and company are required"); return; }
  try {
    const res = await call("request_commercial_license", args);
    showModal('<h3>Request recorded ✓</h3><p>Reference: <b>' + (res.recorded && res.recorded.id) + '</b>. Complete a signed agreement to receive your key.</p>' +
      '<div class="actions"><a href="' + (res.mailto || "#") + '"><button class="ghost">Email licensor</button></a>' +
      '<button class="primary" onclick="closeModal()">Done</button></div>');
  } catch (e) { toast(e.message.slice(0, 140)); }
}

/* ---------- boot ---------- */
function esc(s) { return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }

$("#typeSeg").addEventListener("click", (e) => {
  const b = e.target.closest("button"); if (!b) return;
  state.type = b.dataset.type; store.set("type", state.type);
  [...$("#typeSeg").children].forEach((x) => x.classList.toggle("on", x === b));
  refresh();
});
$("#board").addEventListener("change", (e) => { state.board = e.target.value; store.set("board", state.board); expanded["Done"] = false; refresh(); });

// date-range controls (Done column)
$("#rangeSeg").addEventListener("click", (e) => {
  const b = e.target.closest("button"); if (!b) return;
  state.range = b.dataset.range; store.set("range", state.range);
  [...$("#rangeSeg").children].forEach((x) => x.classList.toggle("on", x === b));
  $("#refDate").disabled = state.range === "all";
  renderBoard(state.tasks);
});
$("#refDate").addEventListener("change", (e) => {
  state.refDate = e.target.value || today(); store.set("refDate", state.refDate);
  renderBoard(state.tasks);
});
$("#rangeToday").addEventListener("click", () => {
  state.refDate = today(); store.set("refDate", state.refDate);
  $("#refDate").value = state.refDate; renderBoard(state.tasks);
});
$("#productFilter").addEventListener("change", (e) => {
  state.product = e.target.value; store.set("product", state.product);
  renderBoard(state.tasks);
});
$("#sprintFilter").addEventListener("change", (e) => {
  state.sprint = e.target.value; store.set("sprint", state.sprint);
  renderBoard(state.tasks);
});
$("#newSprintBtn").addEventListener("click", openNewSprint);
$("#budgetBtn").addEventListener("click", openBudget);
$("#dailyPlanBtn").addEventListener("click", openDailyPlan);
$("#churnBtn").addEventListener("click", openChurn);
$("#addBtn").addEventListener("click", openAdd);
$("#settingsBtn").addEventListener("click", openSettings);
$("#notesBtn").addEventListener("click", openNotes);
$("#brainstormBtn").addEventListener("click", openBrainstorm);
$("#importBtn").addEventListener("click", openImport);
$("#linksBtn").addEventListener("click", openLinks);
$("#testsBtn").addEventListener("click", openTests);
$("#analyticsBtn").addEventListener("click", openAnalytics);
$("#prioBtn").addEventListener("click", autoPrioritize);

(async function init() {
  state.license = await loadLicense();
  let projects = [];
  try { projects = (await call("list_projects")).projects || []; }
  catch (e) { $("#content").innerHTML = '<div class="loading">Could not reach FeatureBoard. Is the extension enabled?<br>' + esc(e.message) + '</div>'; return; }

  if (!projects.length) { $("#content").innerHTML = '<div class="loading">No boards yet. Create one from chat: “create a FeatureBoard project called …”.</div>'; }
  const sel = $("#board");
  sel.innerHTML = projects.map((p) => '<option value="' + esc(p.name) + '">' + esc(p.name) + ' (' + esc(p.prefix) + ')</option>').join("");
  if (!state.board || !projects.some((p) => p.name === state.board)) state.board = projects[0] && projects[0].name;
  sel.value = state.board;
  [...$("#typeSeg").children].forEach((x) => x.classList.toggle("on", x.dataset.type === state.type));
  [...$("#rangeSeg").children].forEach((x) => x.classList.toggle("on", x.dataset.range === state.range));
  $("#refDate").value = state.refDate;
  $("#refDate").disabled = state.range === "all";

  renderLicense();
  if (state.board) refresh();
})();
</script>
